<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Foodie">
<meta name="theme-color" content="#1A1A1A">
<title>Foodie 🍽️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-subtle: #F5F0E8;
  --text: #1A1A1A;
  --text-2: #6B6B6B;
  --text-3: #A0A0A0;
  --accent: #E8613C;
  --accent-soft: #FDF0EB;
  --accent-2: #2D6A4F;
  --border: #EBEBEB;
  --border-strong: #D0D0D0;
  --nav-bg: #FFFFFF;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}

body.dark {
  --bg: #111111;
  --bg-card: #1C1C1C;
  --bg-subtle: #242424;
  --text: #F0EDE8;
  --text-2: #9A9A9A;
  --text-3: #666666;
  --accent: #F07050;
  --accent-soft: #2A1A15;
  --border: #2A2A2A;
  --border-strong: #3A3A3A;
  --nav-bg: #1C1C1C;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}

body.sage {
  --bg: #F2F5F0;
  --bg-card: #FFFFFF;
  --bg-subtle: #E8EFE5;
  --text: #1E2B1A;
  --text-2: #5A7054;
  --text-3: #9AAA94;
  --accent: #4A7C59;
  --accent-soft: #E8F0E5;
  --border: #D8E4D5;
  --border-strong: #B8CEB5;
  --nav-bg: #FFFFFF;
}

body.slate {
  --bg: #F0F2F5;
  --bg-card: #FFFFFF;
  --bg-subtle: #E5E8EF;
  --text: #1A1E2A;
  --text-2: #5A6070;
  --text-3: #9AA0AA;
  --accent: #3D5AF1;
  --accent-soft: #EEF1FE;
  --border: #DEE2EC;
  --border-strong: #C0C8D8;
  --nav-bg: #FFFFFF;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  height: 100dvh;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
}

/* ===== HEADER ===== */
#header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.header-wordmark span {
  color: var(--accent);
}

.header-sub {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 1px;
  font-weight: 400;
  letter-spacing: 0.2px;
}

#btn-new {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.2px;
}

/* ===== CONTENT ===== */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}

/* ===== NAV ===== */
#nav {
  background: var(--nav-bg);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}

#nav button {
  flex: 1;
  background: none;
  border: none;
  padding: 10px 0 5px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  color: var(--text-3);
  transition: color 0.15s;
}

#nav button .nav-icon { font-size: 20px; display: block; }
#nav button .nav-label { font-size: 9px; font-weight: 600; margin-top: 2px; letter-spacing: 0.3px; text-transform: uppercase; }
#nav button.active { color: var(--accent); }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.card-padded { padding: 16px; }

/* ===== SECTION TITLE ===== */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 12px;
  margin-top: 4px;
}

/* ===== RESTAURANT CARD ===== */
.resto-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
}

.resto-card:active { transform: scale(0.99); }

.resto-stripe {
  width: 5px;
  flex-shrink: 0;
}

.resto-body {
  flex: 1;
  padding: 13px 14px;
  min-width: 0;
}

.resto-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.resto-meta {
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.resto-price-dots {
  display: flex;
  gap: 2px;
  align-items: center;
}

.price-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.price-dot.empty {
  background: var(--border-strong);
}

.resto-rating {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 3px;
}

.resto-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.tag {
  background: var(--bg-subtle);
  color: var(--text-2);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}

.tag-accent {
  background: var(--accent-soft);
  color: var(--accent);
}

.resto-right {
  padding: 13px 14px 13px 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: space-between;
  flex-shrink: 0;
}

.visits-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
}

/* ===== STATS ROW ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.stat-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.stat-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}

.modal-sheet {
  background: var(--bg-card);
  border-radius: 24px 24px 0 0;
  padding: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 90dvh;
  overflow-y: auto;
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 0 auto 18px;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 18px;
  color: var(--text);
}

.modal-close {
  float: right;
  background: var(--bg-subtle);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
}

/* ===== FORM ELEMENTS ===== */
.form-row { margin-bottom: 14px; }

.form-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 6px;
  display: block;
}

.form-input {
  width: 100%;
  background: var(--bg-subtle);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus { border-color: var(--accent); }

.form-2col { display: flex; gap: 10px; }
.form-2col > * { flex: 1; }

textarea.form-input { resize: vertical; min-height: 70px; }

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.2px;
  margin-top: 6px;
}

.btn-secondary {
  width: 100%;
  background: var(--bg-subtle);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  margin-top: 8px;
}

.btn-ghost {
  background: none;
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  width: 100%;
  font-family: 'Inter', sans-serif;
  margin-top: 6px;
}

/* ===== CHIPS ===== */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

.chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all 0.12s;
  color: var(--text-2);
  background: var(--bg-card);
}

.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ===== PRICE SELECTOR ===== */
.price-selector { display: flex; gap: 6px; margin-top: 6px; }

.price-opt {
  flex: 1;
  text-align: center;
  padding: 10px 4px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.12s;
  color: var(--text-2);
}

.price-opt.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== STAR RATING ===== */
.star-row { display: flex; gap: 4px; margin-top: 6px; }

.star {
  font-size: 26px;
  cursor: pointer;
  transition: transform 0.1s;
  line-height: 1;
  filter: grayscale(1) opacity(0.3);
}

.star.active { filter: none; }
.star:active { transform: scale(1.2); }

/* ===== DIARY CARD ===== */
.diary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
}

.diary-date {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}

.diary-resto-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.diary-meta {
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 6px;
}

.diary-note {
  font-size: 12px;
  color: var(--text-2);
  font-style: italic;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

/* ===== ROULETTE ===== */
.roulette-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 20px;
}

#roulette-canvas {
  border-radius: 50%;
  box-shadow: var(--shadow-md);
  max-width: 280px;
  max-height: 280px;
}

.roulette-btn {
  margin-top: 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 40px;
  padding: 14px 36px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.3px;
  box-shadow: var(--shadow-md);
}

.roulette-result {
  margin-top: 16px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  min-height: 30px;
}

.roulette-result-meta {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text-2);
  margin-top: 4px;
}

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 14px;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  background: var(--bg-card);
  color: var(--text-2);
  flex-shrink: 0;
  transition: all 0.12s;
}

.filter-pill.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* ===== RANKING ===== */
.rank-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.rank-item:last-child { border-bottom: none; }

.rank-num {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-3);
  width: 24px;
  flex-shrink: 0;
  text-align: center;
}

.rank-num.gold { color: #D4AF37; }
.rank-num.silver { color: #A8A9AD; }
.rank-num.bronze { color: #CD7F32; }

.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.rank-score { font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

/* ===== RECIPE CARD ===== */
.recipe-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: box-shadow 0.15s;
}

.recipe-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.recipe-meta {
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.recipe-ingredient-list {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ===== FAVORITES ===== */
.fav-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
}

.fav-dish-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}

.fav-resto {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}

.fav-user-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--accent-soft);
  color: var(--accent);
  flex-shrink: 0;
}

/* ===== DISCOVER ===== */
.pending-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.pending-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}

.pending-meta {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}

/* ===== SCANNER ===== */
.scanner-area {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 14px;
}

.scanner-area:hover { border-color: var(--accent); background: var(--accent-soft); }

.ticket-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
}

.ticket-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.ticket-total {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.ticket-items {
  font-size: 12px;
  color: var(--text-2);
  border-top: 1px dashed var(--border);
  padding-top: 8px;
  margin-top: 8px;
  line-height: 1.8;
}

/* ===== THEME SELECTOR ===== */
.theme-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.theme-btn {
  flex: 1;
  padding: 8px 6px;
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  font-family: 'Inter', sans-serif;
  transition: all 0.12s;
}

.theme-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-3);
}

.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.5; }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  max-width: 90%;
  text-align: center;
  white-space: nowrap;
}

#toast.show { opacity: 1; }

/* ===== DIVIDER ===== */
.divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;

<script>
// ================================================================
// DATA STRUCTURES
// ================================================================

/*
  Restaurant: {
    id, name, city, country, cuisine, priceLevel (1-5),
    notes, pendingVisit (bool),
    favDishes: [{ dish, user, note }],
    visits: [{ date, rating, who, totalSpent, notes, items:[] }]
  }
  Recipe: {
    id, name, cuisine, time, difficulty, servings,
    ingredients (string), steps (string), notes, createdAt
  }
  Ticket: {
    id, date, restaurantId (opt), restaurantName,
    total, items:[], notes, savedAt
  }
*/

let restaurants = [];
let recipes = [];
let tickets = [];
let currentView = 'restaurants';
let currentTheme = 'light';

// Filters
let filterCuisine = 'all';
let filterDiscover = 'all';
let filterFavUser = 'all';
let rouletteFilters = { cuisine: 'all', price: 'all', city: 'all' };

// Roulette state
let rouletteAngle = 0;
let rouletteSpinning = false;
let rouletteResult = null;

// NUEVOS: Search y "Qué me apetece"
let searchTerm = '';
let wiqFilters = { type: null, speed: null, budget: null, terrace: null, cuisine: null };

// ================================================================
// STORAGE
// ================================================================
function saveData() {
  localStorage.setItem('foodie_restaurants', JSON.stringify(restaurants));
  localStorage.setItem('foodie_recipes', JSON.stringify(recipes));
  localStorage.setItem('foodie_tickets', JSON.stringify(tickets));
}

function loadData() {
  try { restaurants = JSON.parse(localStorage.getItem('foodie_restaurants') || '[]'); } catch(e) { restaurants = []; }
  try { recipes = JSON.parse(localStorage.getItem('foodie_recipes') || '[]'); } catch(e) { recipes = []; }
  try { tickets = JSON.parse(localStorage.getItem('foodie_tickets') || '[]'); } catch(e) { tickets = []; }
  currentTheme = localStorage.getItem('foodie_theme') || 'light';
}

function exportData() {
  const blob = new Blob([JSON.stringify({ restaurants, recipes, tickets }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.download = `foodie_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.href = URL.createObjectURL(blob);
  a.click();
  showToast('✓ Copia exportada');
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.restaurants) restaurants = d.restaurants;
      if (d.recipes) recipes = d.recipes;
      if (d.tickets) tickets = d.tickets;
      saveData(); render();
      showToast('✓ Datos importados');
    } catch(err) { showToast('Archivo inválido', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ================================================================
// HELPERS
// ================================================================
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#DC2626' : 'var(--text)';
  t.style.color = isError ? '#fff' : 'var(--bg)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatDateShort(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

const CUISINES = [
  'Italiana','Japonesa','Española','Mexicana','Americana',
  'Francesa','China','India','Mediterránea','Árabe',
  'Griega','Tailandesa','Peruana','Burger','Pizza','Tapas','Otro'
];

function stripeClass(cuisine) {
  if (!cuisine) return 'stripe-otro';
  return 'stripe-' + cuisine.toLowerCase().replace(/[áéíóú]/g, c => ({á:'a',é:'e',í:'i',ó:'o',ú:'u'}[c]));
}

function priceDotsHtml(level, size = 5) {
  let html = '<div class="resto-price-dots">';
  for (let i = 1; i <= 5; i++) {
    html += `<div class="price-dot${i > level ? ' empty' : ''}" style="width:${size}px;height:${size}px"></div>`;
  }
  return html + '</div>';
}

function priceLabelHtml(level) {
  const labels = ['', '€', '€€', '€€€', '€€€€', '€€€€€'];
  return labels[level] || '—';
}

function getRestaurantAvgRating(r) {
  const visits = (r.visits || []).filter(v => v.rating > 0);
  if (!visits.length) return null;
  const avg = visits.reduce((a, v) => a + v.rating, 0) / visits.length;
  return Math.round(avg * 10) / 10;
}

function starsHtml(rating, size = 13) {
  if (!rating) return '—';
  const full = Math.floor(rating);
  const half = rating - full >= 0.4 ? 1 : 0;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return `<span style="color:#D4AF37;font-size:${size}px">${s}</span> <span style="font-size:${size}px;font-weight:700">${rating}</span>`;
}

function allVisits() {
  const visits = [];
  restaurants.forEach(r => {
    (r.visits || []).forEach(v => {
      visits.push({ ...v, restaurantName: r.name, restaurantId: r.id, cuisine: r.cuisine, priceLevel: r.priceLevel });
    });
  });
  return visits.sort((a, b) => b.date.localeCompare(a.date));
}

function getUniqueCuisines() {
  const set = new Set(restaurants.map(r => r.cuisine).filter(Boolean));
  return [...set].sort();
}

function getUniqueCities() {
  const set = new Set(restaurants.map(r => r.city).filter(Boolean));
  return [...set].sort();
}

// ================================================================
// NUEVO: ÍNDICE FOODIE
// ================================================================
function calculateFoodieScore(restaurant) {
  // 40% valoración, 20% frecuencia, 15% calidad-precio, 15% platos favoritos, 10% recencia
  let score = 0;
  
  // Valoración (0-5)
  const avgRating = getRestaurantAvgRating(restaurant) || 0;
  score += (avgRating / 5) * 40;
  
  // Frecuencia (máximo 20 puntos por 20+ visitas)
  const visitCount = (restaurant.visits || []).length;
  score += Math.min(visitCount, 20) * 1;
  
  // Calidad-Precio (inversamente proporcional al precio, máximo 15)
  // Precio 1 = 15, precio 5 = 3
  const priceScore = 15 - (restaurant.priceLevel - 1) * 3;
  score += Math.max(priceScore, 0);
  
  // Platos favoritos (máximo 15)
  const favCount = (restaurant.favDishes || []).length;
  score += Math.min(favCount, 15);
  
  // Recencia (máximo 10 puntos)
  const visits = (restaurant.visits || []).sort((a, b) => b.date.localeCompare(a.date));
  if (visits.length > 0) {
    const lastVisitDate = new Date(visits[0].date + 'T12:00:00');
    const now = new Date();
    const daysSince = Math.floor((now - lastVisitDate) / (1000 * 60 * 60 * 24));
    if (daysSince <= 30) score += 10;
    else if (daysSince <= 90) score += 5;
  }
  
  return Math.min(Math.round(score), 100);
}

// ================================================================
// NAVIGATION
// ================================================================
function showView(v) {
  currentView = v;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + v);
  if (nb) nb.classList.add('active');
  document.getElementById('btn-new').style.display = ['recipes','more'].includes(v) ? 'none' : '';
  render();
  if (v === 'roulette') setTimeout(drawRoulette, 80);
  if (v === 'more') setTimeout(initStatsCharts, 80);
}

function handleNew() {
  if (currentView === 'restaurants') openRestaurantModal(null);
  else if (currentView === 'diary') openDiaryModal(null);
  else if (currentView === 'discover') openPendingModal(null);
  else if (currentView === 'favorites') openFavModal(null);
  else if (currentView === 'roulette') openRouletteFilters();
  else openRestaurantModal(null);
}

function updateHeader() {
  const total = restaurants.filter(r => !r.pendingVisit).length;
  const pending = restaurants.filter(r => r.pendingVisit).length;
  document.getElementById('header-sub').textContent = `${total} restaurantes · ${pending} pendientes`;
}

function render() {
  updateHeader();
  const c = document.getElementById('content');
  if (currentView === 'restaurants') c.innerHTML = renderRestaurants();
  else if (currentView === 'diary') c.innerHTML = renderDiary();
  else if (currentView === 'discover') c.innerHTML = renderDiscover();
  else if (currentView === 'roulette') c.innerHTML = renderRoulette();
  else if (currentView === 'favorites') c.innerHTML = renderFavorites();
  else if (currentView === 'more') c.innerHTML = renderMore();
}

// ================================================================
// VIEW: RESTAURANTS (CON BÚSQUEDA)
// ================================================================
function renderRestaurants() {
  const visited = restaurants.filter(r => !r.pendingVisit);
  const cuisines = getUniqueCuisines();

  let filtered = filterCuisine === 'all' ? visited : visited.filter(r => r.cuisine === filterCuisine);
  if (searchTerm) {
    filtered = filtered.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));
  }
  filtered.sort((a, b) => {
    const ra = getRestaurantAvgRating(a) || 0;
    const rb = getRestaurantAvgRating(b) || 0;
    return rb - ra;
  });

  const filterHtml = `
    <div class="filter-bar">
      <div class="filter-pill ${filterCuisine === 'all' ? 'active' : ''}" onclick="setFilterCuisine('all')">Todos</div>
      ${cuisines.map(c => `<div class="filter-pill ${filterCuisine === c ? 'active' : ''}" onclick="setFilterCuisine('${c}')">${c}</div>`).join('')}
    </div>
    <div class="search-bar">
      <input type="text" class="form-input" placeholder="🔍 Buscar restaurante..." id="restaurant-search" value="${searchTerm}" oninput="updateSearch(this.value)">
    </div>
  `;

  if (!visited.length) {
    return `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">Sin restaurantes aún</div><div class="empty-sub">Añade tu primer restaurante con el botón de arriba</div></div>`;
  }
  return filterHtml + filtered.map(renderRestoCard).join('') || '<div class="empty-state"><div class="empty-sub">Ningún restaurante con este filtro</div></div>';
}

function updateSearch(term) {
  searchTerm = term;
  render();
}

function setFilterCuisine(c) { filterCuisine = c; render(); }

function renderRestoCard(r) {
  const rating = getRestaurantAvgRating(r);
  const visits = (r.visits || []).length;
  const sc = stripeClass(r.cuisine);

  return `<div class="resto-card" onclick="openRestaurantDetail(${r.id})">
    <div class="resto-stripe ${sc}"></div>
    <div class="resto-body">
      <div class="resto-name">${r.name}</div>
      <div class="resto-meta">
        <span>${r.city || ''}${r.country && r.country !== r.city ? ', ' + r.country : ''}</span>
        ${priceDotsHtml(r.priceLevel || 1, 5)}
      </div>
      <div class="resto-tags">
        ${r.cuisine ? `<span class="tag tag-accent">${r.cuisine}</span>` : ''}
        ${(r.favDishes || []).slice(0, 2).map(f => `<span class="tag">♥ ${f.dish}</span>`).join('')}
      </div>
    </div>
    <div class="resto-right">
      <div class="resto-rating">${rating ? starsHtml(rating, 11) : '<span style="color:var(--text-3);font-size:11px">sin nota</span>'}</div>
      <div class="visits-badge">${visits} visita${visits !== 1 ? 's' : ''}</div>

}

          ${rating ? `<div style="margin-top:5px">${starsHtml(rating)}</div>` : ''}
        </div>

function deleteRestaurant(id) {
  if (!confirm('¿Eliminar este restaurante y todas sus visitas?')) return;
  restaurants = restaurants.filter(r => r.id !== id);
  saveData(); closeModal(); render();
  showToast('Restaurante eliminado');
}

function removeFavDish(restoId, dishIdx) {
  const r = restaurants.find(x => x.id === restoId);
  if (!r) return;
  r.favDishes.splice(dishIdx, 1);
  saveData();
  openRestaurantDetail(restoId);
}

function saveRestaurant() {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { showToast('Escribe un nombre', true); return; }

  const data = {
    id: editingRestoId || Date.now(),
    name,

    country: document.getElementById('r-country').value.trim() || 'España',

    visits: editingRestoId ? (restaurants.find(r => r.id === editingRestoId)?.visits || []) : []
  };

  const idx = restaurants.findIndex(r => r.id === data.id);
  if (idx >= 0) restaurants[idx] = data;
  else restaurants.unshift(data);

  saveData(); closeModal(); render();
  showToast(`"${name}" guardado ✓`);

function setWho(val) {

function saveVisit(restoId) {

  const date = document.getElementById('v-date').value;

    date,
    rating: visitRating,
    who: window._visitWho || 'Ambos',

  r.visits.push(visit);

function renderDiary() {
  const visits = allVisits();

  if (!visits.length) {
    return `<div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-title">Diario vacío</div>
      <div class="empty-sub">Registra tus visitas desde la ficha de cada restaurante</div>
    </div>`;
  }

  const byMonth = {};
  visits.forEach(v => {
    const key = v.date.slice(0, 7);
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(v);
  });

  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  let html = '';
  Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([key, monthVisits]) => {
    const [y, m] = key.split('-');
    const monthLabel = `${monthNames[parseInt(m) - 1]} ${y}`;
    const total = monthVisits.reduce((a, v) => a + (v.totalSpent || 0), 0);
    const avgRating = monthVisits.filter(v => v.rating).reduce((a, v) => a + v.rating, 0) / (monthVisits.filter(v => v.rating).length || 1);

    html += `<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline">
      <div class="section-label" style="margin:0">${monthLabel}</div>
      <div style="font-size:11px;color:var(--text-3)">${monthVisits.length} visita${monthVisits.length !== 1 ? 's' : ''} · ${total ? total.toFixed(0) + '€ gastados' : ''}</div>
    </div>`;

    html += monthVisits.map(v => `
      <div class="diary-card" onclick="openRestaurantDetail(${v.restaurantId})">
        <div class="diary-date">${formatDate(v.date)}</div>
        <div class="diary-resto-name">${v.restaurantName}</div>
        <div class="diary-meta">
          ${v.rating ? starsHtml(v.rating) : ''}
          <span class="tag">${v.cuisine || ''}</span>
          <span>👤 ${v.who || 'Ambos'}</span>
          ${v.totalSpent ? `<span>💶 ${v.totalSpent}€</span>` : ''}
        </div>
        ${v.notes ? `<div class="diary-note">${v.notes}</div>` : ''}
      </div>`).join('');
  });

  return html;
}

// ================================================================
// VIEW: DISCOVER (CON HORARIO)
// ================================================================
function renderDiscover() {
  const pending = restaurants.filter(r => r.pendingVisit);
  const visited = restaurants.filter(r => !r.pendingVisit);

  const today = new Date();
  const suggestions = visited.filter(r => {
    const visits = r.visits || [];
    if (!visits.length) return true;
    const last = new Date(visits.sort((a, b) => b.date.localeCompare(a.date))[0].date + 'T12:00:00');
    return (today - last) / (1000 * 60 * 60 * 24) > 60;
  }).slice(0, 4);

  let html = '';

  if (pending.length) {
    html += `<div class="section-label">Para ir pronto (${pending.length})</div>`;
    html += pending.map(r => `
      <div class="pending-card" onclick="openPendingDetail(${r.id})">
        <div class="resto-stripe ${stripeClass(r.cuisine)}" style="width:4px;border-radius:2px;flex-shrink:0;min-height:40px"></div>
        <div style="flex:1;padding-left:8px">
          <div class="pending-name">${r.name}</div>
          <div class="pending-meta">${r.city || ''} · ${r.cuisine || ''} · ${priceLabelHtml(r.priceLevel)}${r.hours ? ` · 🕒 ${r.hours}` : ''}</div>
        </div>
        <button onclick="event.stopPropagation();markAsVisited(${r.id})" style="background:var(--accent-soft);border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer">Ya fui ✓</button>
      </div>`).join('');
    html += '<div class="divider"></div>';
  }

  if (suggestions.length) {
    html += `<div class="section-label">Hace tiempo que no vas...</div>`;
    html += suggestions.map(r => {
      const visits = r.visits || [];
      const lastVisit = visits.length ? visits.sort((a, b) => b.date.localeCompare(a.date))[0] : null;
      const daysSince = lastVisit ? Math.round((today - new Date(lastVisit.date + 'T12:00:00')) / (1000 * 60 * 60 * 24)) : null;
      return `<div class="pending-card" onclick="openRestaurantDetail(${r.id})">
        <div class="resto-stripe ${stripeClass(r.cuisine)}" style="width:4px;border-radius:2px;flex-shrink:0;min-height:40px"></div>
        <div style="flex:1;padding-left:8px">
          <div class="pending-name">${r.name}</div>
          <div class="pending-meta">${r.cuisine || ''} · ${daysSince ? `Última visita hace ${daysSince} días` : 'Sin visitas'}</div>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--text-3);flex-shrink:0">${getRestaurantAvgRating(r) ? starsHtml(getRestaurantAvgRating(r), 10) : ''}</div>
      </div>`;
    }).join('');
  }

  if (!pending.length && !suggestions.length) {
    html = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">¡Todo al día!</div>
      <div class="empty-sub">Añade restaurantes a tu lista de pendientes o espera a tener más historial</div>
    </div>`;
  }

  return html;
}

function renderFavorites() {
  const allFavs = [];
  restaurants.filter(r => !r.pendingVisit).forEach(r => {
    (r.favDishes || []).forEach(f => {
      allFavs.push({ ...f, restaurantName: r.name, restaurantId: r.id, cuisine: r.cuisine });
    });
  });

  const filterHtml = `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <div class="filter-bar" style="margin-bottom:0; flex:1">
      <div class="filter-pill ${filterFavUser === 'all' ? 'active' : ''}" onclick="setFilterFavUser('all')">Todos</div>
      <div class="filter-pill ${filterFavUser === 'Valle' ? 'active' : ''}" onclick="setFilterFavUser('Valle')">♥ Valle</div>
      <div class="filter-pill ${filterFavUser === 'Jandro' ? 'active' : ''}" onclick="setFilterFavUser('Jandro')">♥ Jandro</div>
      <div class="filter-pill ${filterFavUser === 'Ambos' ? 'active' : ''}" onclick="setFilterFavUser('Ambos')">♥ Ambos</div>
    </div>
    <button class="ranking-btn" onclick="showRankingModal()">🏆 Ranking</button>
  </div>`;

  const filtered = filterFavUser === 'all' ? allFavs : allFavs.filter(f => f.user === filterFavUser);

  if (!filtered.length) {
    return filterHtml + `<div class="empty-state">
      <div class="empty-icon">♥</div>
      <div class="empty-title">Sin favoritos aún</div>
      <div class="empty-sub">Añade platos favoritos desde la ficha de cada restaurante</div>
    </div>`;
  }

  const grouped = {};
  filtered.forEach(f => {
    if (!grouped[f.cuisine]) grouped[f.cuisine] = [];
    grouped[f.cuisine].push(f);
  });

  let html = filterHtml;
  Object.entries(grouped).sort().forEach(([cuisine, favs]) => {

function getRouletteRestaurants() {
  return restaurants.filter(r => {
    if (r.pendingVisit) return false;
    if (rouletteFilters.cuisine !== 'all' && r.cuisine !== rouletteFilters.cuisine) return false;
    if (rouletteFilters.city !== 'all' && r.city !== rouletteFilters.city) return false;
    if (rouletteFilters.price !== 'all') {
      if (rouletteFilters.price === '4-5') { if (r.priceLevel < 4) return false; }
      else if (r.priceLevel !== parseInt(rouletteFilters.price)) return false;
    }
    return true;
  });
}

const ROULETTE_COLORS = ['#E8613C','#2D6A4F','#3D5AF1','#D4AF37','#9B59B6','#2980B9','#E84C4C','#F5A623','#1ABC9C','#E91E8C'];

function drawRoulette() {
  const canvas = document.getElementById('roulette-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const candidates = getRouletteRestaurants();
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!candidates.length) {
    ctx.fillStyle = 'var(--border)';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.font = '14px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Sin opciones', cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / candidates.length;

  candidates.forEach((rest, i) => {
    const startAngle = i * slice + rouletteAngle;
    const endAngle = startAngle + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = ROULETTE_COLORS[i % ROULETTE_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${candidates.length > 8 ? 10 : 12}px Inter`;
    const maxLen = 14;
    const label = rest.name.length > maxLen ? rest.name.slice(0, maxLen - 1) + '…' : rest.name;
    ctx.fillText(label, r - 10, 4);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'var(--bg-card)'; ctx.fill();
  ctx.strokeStyle = 'var(--border)'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx + r - 2, cy);
  ctx.lineTo(cx + r + 14, cy - 7);
  ctx.lineTo(cx + r + 14, cy + 7);
  ctx.closePath();
  ctx.fillStyle = 'var(--text)'; ctx.fill();
}

function spinRoulette() {
  if (rouletteSpinning) return;
  const candidates = getRouletteRestaurants();
  if (candidates.length < 2) return;

  rouletteSpinning = true;
  rouletteResult = null;
  document.getElementById('roulette-result').textContent = '';
  document.getElementById('roulette-result-meta').textContent = '...';

  const spins = 5 + Math.random() * 5;
  const totalAngle = spins * Math.PI * 2;
  const duration = 3500;
  const start = performance.now();
  const startAngle = rouletteAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    rouletteAngle = startAngle + totalAngle * easeOut(t);
    drawRoulette();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rouletteSpinning = false;
      const slice = (Math.PI * 2) / candidates.length;
      const normalizedAngle = ((rouletteAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const idx = candidates.length - 1 - Math.floor(normalizedAngle / slice) % candidates.length;
      rouletteResult = candidates[Math.abs(idx) % candidates.length];
      render();
      setTimeout(drawRoulette, 50);
    }
  }

  requestAnimationFrame(animate);
}

  const restoId = document.getElementById('tk-resto').value;
  const restoName = restoId
    ? restaurants.find(r => r.id == restoId)?.name
    : document.getElementById('tk-name').value.trim();

  const itemsRaw = document.getElementById('tk-items').value.trim();
  const items = itemsRaw ? itemsRaw.split('\n').map(l => {
    const parts = l.split('·');
    return { name: parts[0]?.trim() || l, price: parseFloat(parts[1]) || null };
  }) : [];

  const ticket = {
    id: Date.now(),
    date: document.getElementById('tk-date').value,
    restaurantId: restoId ? parseInt(restoId) : null,
    restaurantName: restoName || 'Sin nombre',
    total, items,
    notes: document.getElementById('tk-notes').value.trim(),
    savedAt: new Date().toISOString()
  };

  tickets.unshift(ticket);
  saveData(); closeModal(); render();
  showToast(`Ticket ${total.toFixed(2)}€ guardado ✓`);
}

function renderTicketCard(t) {
  const itemsHtml = t.items?.length ? t.items.map(i =>
    `<div class="scan-line"><span>${i.name}</span><span>${i.price ? i.price.toFixed(2) + '€' : ''}</span></div>`
  ).join('') : '';

  return `<div class="ticket-card">
    <div class="ticket-header">
      <div>
        <div style="font-size:13px;font-weight:600">${t.restaurantName}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">${formatDate(t.date)}</div>
        ${t.notes ? `<div style="font-size:11px;color:var(--text-2);font-style:italic;margin-top:2px">${t.notes}</div>` : ''}
      </div>
      <div class="ticket-total">${t.total.toFixed(2)}€</div>
    </div>
    ${itemsHtml ? `<div class="ticket-items">${itemsHtml}</div>` : ''}
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button onclick="deleteTicket(${t.id})" style="background:none;border:none;font-size:12px;color:var(--text-3);cursor:pointer">🗑 Eliminar</button>
    </div>
  </div>`;
}

function deleteTicket(id) {
  tickets = tickets.filter(t => t.id !== id);
  saveData(); render();
  showToast('Ticket eliminado');
}

// --- STATS CON ÍNDICE FOODIE ---
function renderStatsWithFoodieIndex() {
  const allV = allVisits();
  const totalVisits = allV.length;
  const totalSpent = allV.reduce((a, v) => a + (v.totalSpent || 0), 0);
  const avgSpent = totalVisits ? totalSpent / totalVisits : 0;
  const avgRating = allV.filter(v => v.rating).length
    ? allV.filter(v => v.rating).reduce((a, v) => a + v.rating, 0) / allV.filter(v => v.rating).length
    : 0;

  const visitedRestos = restaurants.filter(r => !r.pendingVisit);
  const foodieRank = visitedRestos.map(r => ({ ...r, score: calculateFoodieScore(r) })).sort((a, b) => b.score - a.score).slice(0, 10);
  
  const foodieHtml = `<div class="chart-card">
    <div class="chart-title">🏆 Índice Foodie (Top 10)</div>
    ${foodieRank.map((r, i) => {
      const medalClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      return `<div class="rank-item">
        <div class="rank-num ${medalClass}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${r.name}</div>
          <div class="rank-sub">${r.cuisine}</div>
        </div>
        <div style="text-align:right">
          <div class="rank-score">${r.score}/100</div>
          <div class="foodie-index-bar"><div class="foodie-index-fill" style="width:${r.score}%"></div></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  return `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${restaurants.filter(r=>!r.pendingVisit).length}</div><div class="stat-lbl">Restaurantes</div></div>
      <div class="stat-box"><div class="stat-val">${totalVisits}</div><div class="stat-lbl">Visitas</div></div>
      <div class="stat-box"><div class="stat-val">${avgRating ? avgRating.toFixed(1) : '—'}</div><div class="stat-lbl">Nota media</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${totalSpent ? totalSpent.toFixed(0) + '€' : '—'}</div><div class="stat-lbl">Total gastado</div></div>
      <div class="stat-box"><div class="stat-val">${avgSpent ? avgSpent.toFixed(0) + '€' : '—'}</div><div class="stat-lbl">Media/visita</div></div>
      <div class="stat-box"><div class="stat-val">${restaurants.filter(r=>r.pendingVisit).length}</div><div class="stat-lbl">Pendientes</div></div>
    </div>

    ${foodieHtml}

    <div class="chart-card">
      <div class="chart-title">🍽️ Visitas por tipo de cocina</div>
      <canvas id="cuisineChart" height="180"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">📅 Visitas por mes</div>
      <canvas id="monthChart" height="180"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">💶 Gasto por mes</div>
      <canvas id="spendChart" height="180"></canvas>
    </div>
  `;
}

function initStatsCharts() {
  const allV = allVisits();
  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? '#9A9A9A' : '#6B6B6B';
  const gridColor = isDark ? '#2A2A2A' : '#EBEBEB';

  const baseOpts = {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: textColor, font: { family: 'Inter', size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: textColor, font: { family: 'Inter', size: 10 } }, grid: { color: gridColor } }
    }
  };

  // Cuisine chart
  const cuisineMap = {};
  allV.forEach(v => { cuisineMap[v.cuisine || 'Otro'] = (cuisineMap[v.cuisine || 'Otro'] || 0) + 1; });
  const cEntries = Object.entries(cuisineMap).sort((a, b) => b[1] - a[1]).slice(0, 8);
  destroyChart('cuisineChart');
  const cCtx = document.getElementById('cuisineChart')?.getContext('2d');
  if (cCtx) {
    chartInstances['cuisineChart'] = new Chart(cCtx, {
      type: 'bar',
      data: {
        labels: cEntries.map(([k]) => k),
        datasets: [{ data: cEntries.map(([, v]) => v), backgroundColor: ROULETTE_COLORS }]
      },
      options: { ...baseOpts, plugins: { legend: { display: false } } }
    });
  }

  // Monthly visits
  const monthMap = {};
  allV.forEach(v => { const key = v.date.slice(0, 7); monthMap[key] = (monthMap[key] || 0) + 1; });
  const mEntries = Object.entries(monthMap).sort().slice(-12);
  destroyChart('monthChart');
  const mCtx = document.getElementById('monthChart')?.getContext('2d');
  if (mCtx) {
    chartInstances['monthChart'] = new Chart(mCtx, {
      type: 'line',
      data: {
        labels: mEntries.map(([k]) => k.slice(5)),
        datasets: [{ data: mEntries.map(([, v]) => v), borderColor: '#E8613C', tension: 0.3, fill: true, backgroundColor: 'rgba(232,97,60,0.1)' }]
      },
      options: baseOpts
    });
  }

  // Monthly spend
  const spendMap = {};
  allV.forEach(v => { if (v.totalSpent) { const key = v.date.slice(0, 7); spendMap[key] = (spendMap[key] || 0) + v.totalSpent; } });
  const sEntries = Object.entries(spendMap).sort().slice(-12);
  destroyChart('spendChart');
  const sCtx = document.getElementById('spendChart')?.getContext('2d');
  if (sCtx) {
    chartInstances['spendChart'] = new Chart(sCtx, {
      type: 'bar',
      data: {
        labels: sEntries.map(([k]) => k.slice(5)),
        datasets: [{ data: sEntries.map(([, v]) => Math.round(v)), backgroundColor: '#2D6A4F' }]
      },
      options: baseOpts
    });
  }
}

function destroyChart(name) {
  if (chartInstances[name]) { try { chartInstances[name].destroy(); } catch(e) {} delete chartInstances[name]; }
}

// --- MAPA INTERACTIVO ---
function renderMap() {
  const mapHtml = `<div class="card card-padded" style="margin-bottom:12px">
    <div class="section-label">🗺️ Mapa de restaurantes</div>
    <div id="foodie-map" class="map-container"></div>
    <div class="empty-sub" style="text-align:center; margin-top:8px">🔵 No visitados · 🟢 Visitados</div>
  </div>`;
  
  setTimeout(() => {
    if (document.getElementById('foodie-map') && !mapInitialized) {
      const map = L.map('foodie-map').setView([41.6488, -0.8891], 13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { 
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors' 
      }).addTo(map);
      
      restaurants.forEach(r => {
        // Simulación de coordenadas (idealmente vendrían de una API de geocodificación)
        // En una app real, se deberían obtener las coordenadas reales o permitir al usuario asignarlas
        const lat = 41.6488 + (Math.random() - 0.5) * 0.1;
        const lng = -0.8891 + (Math.random() - 0.5) * 0.1;
        const markerColor = r.visits && r.visits.length > 0 ? 'green' : 'blue';
        const marker = L.circleMarker([lat, lng], { 
          radius: 8, 
          fillColor: markerColor, 
          color: '#fff', 
          weight: 2, 
          opacity: 1, 
          fillOpacity: 0.8 
        }).addTo(map);
        marker.bindPopup(`<b>${r.name}</b><br>${r.cuisine}<br>${r.visits?.length || 0} visitas`);
      });
      mapInitialized = true;
    }
  }, 100);
  
  return mapHtml;
}

function setTheme(t) {
  document.body.className = t;

  if (moreTab === 'stats') setTimeout(initStatsCharts, 50);
  if (currentView === 'roulette') setTimeout(drawRoulette, 50);
  if (moreTab === 'map') setTimeout(renderMap, 100);
}
