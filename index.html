<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Foodie">
<meta name="theme-color" content="#1A1A1A">
<title>Foodie 🍽️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #FAFAF8; --bg-card: #FFFFFF; --bg-subtle: #F5F0E8;
  --text: #1A1A1A; --text-2: #6B6B6B; --text-3: #A0A0A0;
  --accent: #E8613C; --accent-soft: #FDF0EB; --accent-2: #2D6A4F;
  --border: #EBEBEB; --border-strong: #D0D0D0; --nav-bg: #FFFFFF;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 16px; --radius-sm: 10px;
}
body.dark {
  --bg: #111111; --bg-card: #1C1C1C; --bg-subtle: #242424;
  --text: #F0EDE8; --text-2: #9A9A9A; --text-3: #666666;
  --accent: #F07050; --accent-soft: #2A1A15;
  --border: #2A2A2A; --border-strong: #3A3A3A; --nav-bg: #1C1C1C;
  --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}
body.sage {
  --bg: #F2F5F0; --bg-card: #FFFFFF; --bg-subtle: #E8EFE5;
  --text: #1E2B1A; --text-2: #5A7054; --text-3: #9AAA94;
  --accent: #4A7C59; --accent-soft: #E8F0E5;
  --border: #D8E4D5; --border-strong: #B8CEB5; --nav-bg: #FFFFFF;
}
body.slate {
  --bg: #F0F2F5; --bg-card: #FFFFFF; --bg-subtle: #E5E8EF;
  --text: #1A1E2A; --text-2: #5A6070; --text-3: #9AA0AA;
  --accent: #3D5AF1; --accent-soft: #EEF1FE;
  --border: #DEE2EC; --border-strong: #C0C8D8; --nav-bg: #FFFFFF;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  height: 100dvh; overflow: hidden;
  transition: background 0.2s, color 0.2s;
}
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* ===== HEADER ===== */
#header {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 16px; padding-top: max(16px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.header-wordmark { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
.header-wordmark span { color: var(--accent); }
.header-sub { font-size: 11px; color: var(--text-2); margin-top: 1px; font-weight: 400; letter-spacing: 0.2px; }
#btn-new { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 8px 16px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.2px; }

/* ===== CONTENT ===== */
#content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

/* ===== NAV ===== */
#nav {
  background: var(--nav-bg); border-top: 1px solid var(--border);
  display: flex; flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
#nav button { flex: 1; background: none; border: none; padding: 10px 0 5px; cursor: pointer; font-family: 'Inter', sans-serif; color: var(--text-3); transition: color 0.15s; }
#nav button .nav-icon { font-size: 20px; display: block; }
#nav button .nav-label { font-size: 9px; font-weight: 600; margin-top: 2px; letter-spacing: 0.2px; text-transform: none; }
#nav button.active { color: var(--accent); }

/* ===== CARDS ===== */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.card-padded { padding: 16px; }

/* ===== SECTION TITLE ===== */
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; margin-top: 4px; }

/* ===== RESTAURANT CARD ===== */
.resto-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow);
  display: flex; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s;
}
.resto-card:active { transform: scale(0.99); }
.resto-stripe { width: 5px; flex-shrink: 0; }
.resto-body { flex: 1; padding: 13px 14px; min-width: 0; }
.resto-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.resto-meta { font-size: 11px; color: var(--text-2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.resto-price-dots { display: flex; gap: 2px; align-items: center; }
.price-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.price-dot.empty { background: var(--border-strong); }
.resto-rating { font-size: 12px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 3px; }
.resto-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.tag { background: var(--bg-subtle); color: var(--text-2); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.2px; }
.tag-accent { background: var(--accent-soft); color: var(--accent); }
.resto-right { padding: 13px 14px 13px 0; display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
.visits-badge { font-size: 10px; font-weight: 600; color: var(--text-3); }

/* ===== STATS ROW ===== */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; box-shadow: var(--shadow); }
.stat-val { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-lbl { font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

/* ===== MODALS ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
.modal-sheet { background: var(--bg-card); border-radius: 24px 24px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 90dvh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
.modal-close { float: right; background: var(--bg-subtle); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); }

/* ===== CONFIRM MODAL ===== */
.confirm-modal { background: var(--bg-card); border-radius: 20px; padding: 24px; width: calc(100% - 48px); max-width: 340px; text-align: center; box-shadow: var(--shadow-md); }
.confirm-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text-2); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; border: none; }
.confirm-cancel { background: var(--bg-subtle); color: var(--text); }
.confirm-ok { background: #DC2626; color: #fff; }

/* ===== FORM ELEMENTS ===== */
.form-row { margin-bottom: 14px; }
.form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-2); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg-subtle); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 400; color: var(--text); outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--accent); }
.form-2col { display: flex; gap: 10px; }
.form-2col > * { flex: 1; }
textarea.form-input { resize: vertical; min-height: 70px; }
.btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.2px; margin-top: 6px; }
.btn-secondary { width: 100%; background: var(--bg-subtle); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 8px; }
.btn-ghost { background: none; border: 1.5px dashed var(--border-strong); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; font-weight: 600; color: var(--text-2); cursor: pointer; width: 100%; font-family: 'Inter', sans-serif; margin-top: 6px; }
.btn-danger { background: none; border: 1.5px solid #FCA5A5; border-radius: var(--radius-sm); padding: 12px 14px; color: #DC2626; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 600; }

/* ===== CHIPS ===== */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.chip { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.12s; color: var(--text-2); background: var(--bg-card); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== PRICE SELECTOR ===== */
.price-selector { display: flex; gap: 6px; margin-top: 6px; }
.price-opt { flex: 1; text-align: center; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.12s; color: var(--text-2); }
.price-opt.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ===== STAR RATING ===== */
.star-row { display: flex; gap: 4px; margin-top: 6px; }
.star { font-size: 26px; cursor: pointer; transition: transform 0.1s; line-height: 1; filter: grayscale(1) opacity(0.3); }
.star.active { filter: none; }
.star:active { transform: scale(1.2); }

/* ===== DIARY CARD ===== */
.diary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; padding: 14px 16px; box-shadow: var(--shadow); }
.diary-date { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.diary-resto-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.diary-meta { font-size: 12px; color: var(--text-2); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
.diary-note { font-size: 12px; color: var(--text-2); font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

/* ===== ROULETTE ===== */
.roulette-wrap { display: flex; flex-direction: column; align-items: center; padding: 10px 0 20px; }
#roulette-canvas { border-radius: 50%; box-shadow: var(--shadow-md); max-width: 280px; max-height: 280px; }
.roulette-btn { margin-top: 20px; background: var(--accent); color: #fff; border: none; border-radius: 40px; padding: 14px 36px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; box-shadow: var(--shadow-md); }
.roulette-result { margin-top: 16px; text-align: center; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--text); min-height: 30px; }
.roulette-result-meta { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-2); margin-top: 4px; }

/* ===== FILTER BAR ===== */
.filter-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; white-space: nowrap; background: var(--bg-card); color: var(--text-2); flex-shrink: 0; transition: all 0.12s; }
.filter-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ===== SORT BAR ===== */
.sort-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.sort-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; white-space: nowrap; background: var(--bg-card); color: var(--text-2); flex-shrink: 0; transition: all 0.12s; }
.sort-pill.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

/* ===== RANKING ===== */
.rank-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.rank-item:last-child { border-bottom: none; }
.rank-num { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text-3); width: 24px; flex-shrink: 0; text-align: center; }
.rank-num.gold { color: #D4AF37; }
.rank-num.silver { color: #A8A9AD; }
.rank-num.bronze { color: #CD7F32; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.rank-score { font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

/* ===== RECIPE CARD ===== */
.recipe-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; padding: 14px 16px; box-shadow: var(--shadow); cursor: pointer; }
.recipe-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.recipe-meta { font-size: 11px; color: var(--text-2); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.recipe-ingredient-list { margin-top: 10px; font-size: 12px; color: var(--text-2); line-height: 1.6; padding-top: 10px; border-top: 1px solid var(--border); }

/* ===== FAVORITES ===== */
.fav-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
.fav-dish-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; flex: 1; }
.fav-resto { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.fav-user-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; background: var(--accent-soft); color: var(--accent); flex-shrink: 0; }

/* ===== DISCOVER ===== */
.pending-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; cursor: pointer; }
.pending-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; flex: 1; }
.pending-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }

/* ===== SCANNER ===== */
.scanner-area { border: 2px dashed var(--border-strong); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 14px; }
.scanner-area:hover { border-color: var(--accent); background: var(--accent-soft); }
.ticket-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; padding: 14px 16px; box-shadow: var(--shadow); }
.ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.ticket-total { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--accent); }
.ticket-items { font-size: 12px; color: var(--text-2); border-top: 1px dashed var(--border); padding-top: 8px; margin-top: 8px; line-height: 1.8; }

/* ===== THEME SELECTOR ===== */
.theme-row { display: flex; gap: 8px; margin-bottom: 14px; }
.theme-btn { flex: 1; padding: 8px 6px; border-radius: var(--radius-sm); text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-2); font-family: 'Inter', sans-serif; transition: all 0.12s; }
.theme-btn.active { border-color: var(--accent); color: var(--accent); }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 50px 20px; color: var(--text-3); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.5; }

/* ===== TOAST ===== */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.25s; pointer-events: none; max-width: 90%; text-align: center; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ===== DIVIDER ===== */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ===== CHART CARD ===== */
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.chart-title { font-size: 12px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
canvas { max-width: 100%; height: 180px !important; }

/* ===== CUISINE STRIPE COLORS ===== */
.stripe-italiana{background:#2D9E4E}.stripe-japonesa{background:#E84C4C}.stripe-espanola,.stripe-española{background:#F5A623}.stripe-mexicana{background:#8B4DB8}.stripe-americana{background:#3D7CC9}.stripe-francesa{background:#9B59B6}.stripe-china{background:#E84C4C}.stripe-india{background:#FF8C00}.stripe-mediterranea,.stripe-mediterránea{background:#2980B9}.stripe-arabe,.stripe-árabe{background:#27AE60}.stripe-griega{background:#1ABC9C}.stripe-tailandesa{background:#E91E8C}.stripe-peruana{background:#C0392B}.stripe-burger{background:#E67E22}.stripe-pizza{background:#E74C3C}.stripe-tapas{background:#D4AC0D}.stripe-otro{background:var(--text-3)}
.stripe-vegetariana { background: #5A9A6F }
  
/* ===== MODAL TABS ===== */
.modal-tab-row { display: flex; gap: 6px; margin-bottom: 16px; }
.modal-tab { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--bg-subtle); color: var(--text-2); cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; line-height: 1.2; }
.modal-tab .tab-icon { font-size: 18px; line-height: 1; }
.modal-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== USER TOGGLE ===== */
.user-toggle { display: flex; gap: 6px; margin-top: 6px; }
.user-opt { flex: 1; text-align: center; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.12s; background: var(--bg-card); color: var(--text-2); }
.user-opt.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ===== SCAN RESULT ===== */
.scan-line { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dotted var(--border); }
.scan-line:last-child { border-bottom: none; }

/* ===== IMPORT HIDDEN ===== */
.import-input { display: none; }

/* ===== MISC ===== */
.search-bar { margin-bottom: 12px; }
.foodie-index-bar { background: var(--accent-soft); border-radius: 10px; height: 6px; width: 100%; margin-top: 6px; }
.foodie-index-fill { background: var(--accent); height: 6px; border-radius: 10px; }
.ranking-btn { background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text-2); white-space: nowrap; flex-shrink: 0; }
.what-i-want { background: var(--bg-subtle); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; }
.wiq-question { margin-bottom: 12px; }
.wiq-question label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--text); }
.wiq-options { display: flex; flex-wrap: wrap; gap: 8px; }
.wiq-opt { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text-2); }
.wiq-opt.active { background: var(--accent); color: white; border-color: var(--accent); }
.map-container { height: 400px; width: 100%; border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; z-index: 1; }

/* ===== VISIT ITEM IN DETAIL ===== */
.visit-item { background: var(--bg-subtle); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.visit-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
.visit-delete-btn { background: none; border: none; color: var(--text-3); font-size: 16px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; }
.visit-delete-btn:hover { color: #DC2626; }

/* ===== STORAGE WARNING ===== */
.storage-bar-wrap { background: var(--bg-subtle); border-radius: 8px; overflow: hidden; height: 6px; margin-top: 6px; }
.storage-bar-fill { height: 6px; border-radius: 8px; background: var(--accent); transition: width 0.3s; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div class="header-wordmark">food<span>ie</span></div>
      <div class="header-sub" id="header-sub">cargando...</div>
    </div>
    <button id="btn-new" onclick="handleNew()">+ Añadir</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="active" onclick="showView('restaurants')" id="nav-restaurants"><span class="nav-icon">🍽️</span><span class="nav-label">Lista</span></button>
    <button onclick="showView('diary')" id="nav-diary"><span class="nav-icon">📖</span><span class="nav-label">Diario</span></button>
    <button onclick="showView('discover')" id="nav-discover"><span class="nav-icon">🔍</span><span class="nav-label">Descubrir</span></button>
    <button onclick="showView('roulette')" id="nav-roulette"><span class="nav-icon">🎲</span><span class="nav-label">Ruleta</span></button>
    <button onclick="showView('favorites')" id="nav-favorites"><span class="nav-icon">❤️</span><span class="nav-label">Favoritos</span></button>
    <button onclick="showView('more')" id="nav-more"><span class="nav-icon">•••</span><span class="nav-label">Más</span></button>
  </nav>
</div>

<div id="modal-container"></div>
<div id="toast"></div>
<input type="file" id="import-file" class="import-input" accept=".json" onchange="handleImport(event)">
<input type="file" id="scan-file" class="import-input" accept="image/*" onchange="handleScan(event)">
<input type="file" id="load-json-file" class="import-input" accept=".json">

<script>
// ================================================================
// DATA STRUCTURES
// ================================================================
let restaurants = [];
let recipes = [];
let tickets = [];
let currentView = 'restaurants';
let currentTheme = 'light';

let filterCuisine = 'all';
let filterNeighborhood = 'all';
let filterDiscover = 'all';
let filterFavUser = 'all';
let sortMode = 'rating'; // 'rating' | 'visits' | 'recent' | 'alpha'
let rouletteFilters = { cuisine: 'all', price: 'all', city: 'all', neighborhood: 'all' };
let rouletteAngle = 0;
let rouletteSpinning = false;
let rouletteResult = null;
let searchTerm = '';
let diarySearch = '';
let wiqFilters = { type: null, speed: null, budget: null, terrace: null, cuisine: null };

// ================================================================
// STORAGE
// ================================================================
function saveData() {
  try {
    localStorage.setItem('foodie_restaurants', JSON.stringify(restaurants));
    localStorage.setItem('foodie_recipes', JSON.stringify(recipes));
    localStorage.setItem('foodie_tickets', JSON.stringify(tickets));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      showToast('⚠️ Almacenamiento lleno — exporta una copia', true);
    }
  }
}

function loadData() {
  try { restaurants = JSON.parse(localStorage.getItem('foodie_restaurants') || '[]'); } catch(e) { restaurants = []; }
  try { recipes = JSON.parse(localStorage.getItem('foodie_recipes') || '[]'); } catch(e) { recipes = []; }
  try { tickets = JSON.parse(localStorage.getItem('foodie_tickets') || '[]'); } catch(e) { tickets = []; }
  currentTheme = localStorage.getItem('foodie_theme') || 'light';
}

function getStorageUsageKB() {
  let total = 0;
  try {
    total += (localStorage.getItem('foodie_restaurants') || '').length;
    total += (localStorage.getItem('foodie_recipes') || '').length;
    total += (localStorage.getItem('foodie_tickets') || '').length;
  } catch(e) {}
  return Math.round(total / 1024);
}

function exportData() {
  const blob = new Blob([JSON.stringify({ restaurants, recipes, tickets }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.download = `foodie_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.href = URL.createObjectURL(blob);
  a.click();
  showToast('✓ Copia exportada');
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.restaurants) restaurants = d.restaurants;
      if (d.recipes) recipes = d.recipes;
      if (d.tickets) tickets = d.tickets;
      saveData(); render();
      showToast('✓ Datos importados');
    } catch(err) { showToast('Archivo inválido', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function loadRestaurantsFromJSON() {
  const input = document.getElementById('load-json-file');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        // 🔥 ELIMINA EL BOM (Byte Order Mark) si existe
        let jsonText = ev.target.result;
        // Eliminar BOM (caracteres invisibles al inicio)
        if (jsonText.charCodeAt(0) === 0xFEFF) {
          jsonText = jsonText.slice(1);
        }
        // También eliminar espacios en blanco al inicio
        jsonText = jsonText.trim();
        
        const newRestaurants = JSON.parse(jsonText);
        
        if (Array.isArray(newRestaurants)) {
          const existingIds = new Set(restaurants.map(r => String(r.id)));
          const toAdd = newRestaurants.filter(r => !existingIds.has(String(r.id)));
          
          toAdd.forEach(r => {
            if (!r.id) r.id = Date.now() + Math.random();
            if (!r.favDishes) r.favDishes = [];
            if (!r.visits) r.visits = [];
            // Asegurar que la cocina "Vegetariana" se reconozca
            if (r.cuisine === 'Vegetariana' && !CUISINES.includes('Vegetariana')) {
              // Esto ya no hará falta porque ya añadimos Vegetariana al array
            }
          });
          
          restaurants = [...toAdd, ...restaurants];
          saveData();
          render();
          showToast(`✓ ${toAdd.length} restaurantes cargados (${newRestaurants.length - toAdd.length} ya existían)`);
        } else {
          showToast('Formato inválido — debe ser un array JSON', true);
        }
      } catch(err) {
        console.error('Error al parsear JSON:', err);
        showToast('Error al leer el archivo. Asegúrate de que es un JSON válido.', true);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  input.click();
}

// ================================================================
// HELPERS
// ================================================================
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#DC2626' : 'var(--text)';
  t.style.color = isError ? '#fff' : 'var(--bg)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// Confirm modal (replaces native confirm())
function showConfirm(title, msg, onOk) {
  const html = `<div class="modal-overlay" style="align-items:center">
    <div class="confirm-modal">
      <div class="confirm-title">${title}</div>
      <div class="confirm-msg">${msg}</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeModal()">Cancelar</button>
        <button class="confirm-ok" id="confirm-ok-btn">Eliminar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
  document.getElementById('confirm-ok-btn').onclick = () => { closeModal(); onOk(); };
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}

const CUISINES = [
  'Italiana','Japonesa','Española','Mexicana','Americana',
  'Francesa','China','India','Mediterránea','Árabe',
  'Griega','Tailandesa','Peruana','Burger','Pizza','Tapas',
  'Vegetariana',  // ← AÑADIDO para Baobab, Los Helechos, La Jaula de Grillos
  'Otro'
];

const NEIGHBORHOODS = [
  'Casco Antiguo','El Tubo','Centro','Paseo Independencia','Romareda','Universidad',
  'Delicias','San José','Las Fuentes','Torrero','La Paz','Actur','Rey Fernando',
  'Miralbueno','Valdespartera','Montecanal','Parque Goya','Santa Isabel','Oliver',
  'Valdefierro','Almozara','Expo','Casablanca','Arrabal','San Pablo','La Almozara'
];

function stripeClass(cuisine) {
  if (!cuisine) return 'stripe-otro';
  return 'stripe-' + cuisine.toLowerCase()
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u')
    .replace(/[^a-z]/g,'');
}

function priceDotsHtml(level, size = 5) {
  let html = '<div class="resto-price-dots">';
  for (let i = 1; i <= 5; i++) html += `<div class="price-dot${i > level ? ' empty' : ''}" style="width:${size}px;height:${size}px"></div>`;
  return html + '</div>';
}

function priceLabelHtml(level) {
  return ['','€','€€','€€€','€€€€','€€€€€'][level] || '—';
}

function getRestaurantAvgRating(r) {
  const visits = (r.visits || []).filter(v => v.rating > 0);
  if (!visits.length) return null;
  return Math.round(visits.reduce((a, v) => a + v.rating, 0) / visits.length * 10) / 10;
}

function starsHtml(rating, size = 13) {
  if (!rating) return '—';
  const full = Math.floor(rating);
  const half = rating - full >= 0.4 ? 1 : 0;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return `<span style="color:#D4AF37;font-size:${size}px">${s}</span> <span style="font-size:${size}px;font-weight:700">${rating}</span>`;
}

function allVisits() {
  const visits = [];
  restaurants.forEach(r => {
    (r.visits || []).forEach(v => {
      visits.push({ ...v, restaurantName: r.name, restaurantId: r.id, cuisine: r.cuisine, priceLevel: r.priceLevel, neighborhood: r.neighborhood });
    });
  });
  return visits.sort((a, b) => b.date.localeCompare(a.date));
}

function getUniqueCuisines() {
  return [...new Set(restaurants.map(r => r.cuisine).filter(Boolean))].sort();
}

function getUniqueCities() {
  return [...new Set(restaurants.map(r => r.city).filter(Boolean))].sort();
}

function getUniqueNeighborhoods() {
  return [...new Set(restaurants.map(r => r.neighborhood).filter(Boolean))].sort();
}

// ================================================================
// FOODIE SCORE
// ================================================================
function calculateFoodieScore(restaurant) {
  let score = 0;
  const avgRating = getRestaurantAvgRating(restaurant) || 0;
  score += (avgRating / 5) * 40;
  score += Math.min((restaurant.visits || []).length, 20);
  score += Math.max(15 - (restaurant.priceLevel - 1) * 3, 0);
  score += Math.min((restaurant.favDishes || []).length, 15);
  const visits = (restaurant.visits || []).slice().sort((a, b) => b.date.localeCompare(a.date));
  if (visits.length) {
    const days = Math.floor((new Date() - new Date(visits[0].date + 'T12:00:00')) / 86400000);
    if (days <= 30) score += 10; else if (days <= 90) score += 5;
  }
  return Math.min(Math.round(score), 100);
}

// ================================================================
// NAVIGATION
// ================================================================
function showView(v) {
  currentView = v;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + v);
  if (nb) nb.classList.add('active');
  document.getElementById('btn-new').style.display = ['recipes','more'].includes(v) ? 'none' : '';
  render();
  if (v === 'roulette') setTimeout(drawRoulette, 80);
  if (v === 'more') setTimeout(initStatsCharts, 80);
}

function handleNew() {
  if (currentView === 'restaurants') openRestaurantModal(null);
  else if (currentView === 'diary') openDiaryModal(null);
  else if (currentView === 'discover') openPendingModal(null);
  else if (currentView === 'favorites') openAddFavDishModal(restaurants.find(r => !r.pendingVisit)?.id);
  else if (currentView === 'roulette') openRouletteFilters();
  else openRestaurantModal(null);
}

function updateHeader() {
  const total = restaurants.filter(r => !r.pendingVisit).length;
  const pending = restaurants.filter(r => r.pendingVisit).length;
  document.getElementById('header-sub').textContent = `${total} restaurantes · ${pending} pendientes`;
}

function render() {
  updateHeader();
  const c = document.getElementById('content');
  if (currentView === 'restaurants') c.innerHTML = renderRestaurants();
  else if (currentView === 'diary') c.innerHTML = renderDiary();
  else if (currentView === 'discover') c.innerHTML = renderDiscover();
  else if (currentView === 'roulette') c.innerHTML = renderRoulette();
  else if (currentView === 'favorites') c.innerHTML = renderFavorites();
  else if (currentView === 'more') c.innerHTML = renderMore();
}

// ================================================================
// VIEW: RESTAURANTS
// ================================================================
function renderRestaurants() {
  const visited = restaurants.filter(r => !r.pendingVisit);
  const cuisines = getUniqueCuisines();
  const neighborhoods = getUniqueNeighborhoods();

  let filtered = visited;
  if (filterCuisine !== 'all') filtered = filtered.filter(r => r.cuisine === filterCuisine);
  if (filterNeighborhood !== 'all') filtered = filtered.filter(r => r.neighborhood === filterNeighborhood);
  if (searchTerm) filtered = filtered.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));

  // Ordenación
  filtered.sort((a, b) => {
    if (sortMode === 'rating') {
      const ra = getRestaurantAvgRating(a) || 0, rb = getRestaurantAvgRating(b) || 0;
      return rb - ra;
    }
    if (sortMode === 'visits') return (b.visits||[]).length - (a.visits||[]).length;
    if (sortMode === 'recent') {
      const la = (a.visits||[]).slice().sort((x,y) => y.date.localeCompare(x.date))[0]?.date || '0';
      const lb = (b.visits||[]).slice().sort((x,y) => y.date.localeCompare(x.date))[0]?.date || '0';
      return lb.localeCompare(la);
    }
    if (sortMode === 'alpha') return a.name.localeCompare(b.name, 'es');
    return 0;
  });

  const sortHtml = `<div class="sort-bar">
    ${[['rating','⭐ Nota'],['visits','🔁 Visitas'],['recent','🕐 Reciente'],['alpha','🔤 A-Z']].map(([v,l]) =>
      `<div class="sort-pill ${sortMode === v ? 'active' : ''}" onclick="setSortMode('${v}')">${l}</div>`
    ).join('')}
  </div>`;

  const filterHtml = `
    <div class="filter-bar">
      <div class="filter-pill ${filterCuisine === 'all' ? 'active' : ''}" onclick="setFilterCuisine('all')">Todas</div>
      ${cuisines.map(c => `<div class="filter-pill ${filterCuisine === c ? 'active' : ''}" onclick="setFilterCuisine('${c}')">${c}</div>`).join('')}
    </div>
    ${neighborhoods.length ? `<div class="filter-bar">
      <div class="filter-pill ${filterNeighborhood === 'all' ? 'active' : ''}" onclick="setFilterNeighborhood('all')">Todos los barrios</div>
      ${neighborhoods.map(n => `<div class="filter-pill ${filterNeighborhood === n ? 'active' : ''}" onclick="setFilterNeighborhood('${n}')">${n}</div>`).join('')}
    </div>` : ''}
    <div class="search-bar">
      <input type="text" class="form-input" placeholder="🔍 Buscar restaurante..." value="${searchTerm}" oninput="updateSearch(this.value)">
    </div>
    ${sortHtml}
  `;

  if (!visited.length) {
    return `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <div class="empty-title">Sin restaurantes aún</div>
      <div class="empty-sub">Añade tu primer restaurante o carga el JSON</div>
      <button class="btn-secondary" style="margin-top:16px" onclick="loadRestaurantsFromJSON()">📂 Cargar desde JSON</button>
    </div>`;
  }

const cardsHtml = filtered.length
  ? filtered.map(renderRestoCard).join('')
  : '<div class="empty-state"><div class="empty-sub">Ningún restaurante con estos filtros</div></div>';

return filterHtml + `<div id="resto-cards-container">${cardsHtml}</div>`;
}

function updateSearch(term) {
  searchTerm = term;
  const visited = restaurants.filter(r => !r.pendingVisit);
  let filtered = visited;
  if (filterCuisine !== 'all') filtered = filtered.filter(r => r.cuisine === filterCuisine);
  if (filterNeighborhood !== 'all') filtered = filtered.filter(r => r.neighborhood === filterNeighborhood);
  if (term) filtered = filtered.filter(r => r.name.toLowerCase().includes(term.toLowerCase()));
  filtered.sort((a, b) => {
    if (sortMode === 'rating') { const ra = getRestaurantAvgRating(a)||0, rb = getRestaurantAvgRating(b)||0; return rb - ra; }
    if (sortMode === 'visits') return (b.visits||[]).length - (a.visits||[]).length;
    if (sortMode === 'recent') {
      const la = (a.visits||[]).slice().sort((x,y)=>y.date.localeCompare(x.date))[0]?.date||'0';
      const lb = (b.visits||[]).slice().sort((x,y)=>y.date.localeCompare(x.date))[0]?.date||'0';
      return lb.localeCompare(la);
    }
    if (sortMode === 'alpha') return a.name.localeCompare(b.name, 'es');
    return 0;
  });
  const container = document.getElementById('resto-cards-container');
  if (container) {
    container.innerHTML = filtered.length
      ? filtered.map(renderRestoCard).join('')
      : '<div class="empty-state"><div class="empty-sub">Ningún restaurante con estos filtros</div></div>';
  }
}
function setFilterCuisine(c) { filterCuisine = c; render(); }
function setFilterNeighborhood(n) { filterNeighborhood = n; render(); }
function setSortMode(m) { sortMode = m; render(); }

function renderRestoCard(r) {
  const rating = getRestaurantAvgRating(r);
  const visits = (r.visits || []).length;
  return `<div class="resto-card" onclick="openRestaurantDetail(${r.id})">
    <div class="resto-stripe ${stripeClass(r.cuisine)}"></div>
    <div class="resto-body">
      <div class="resto-name">${r.name}</div>
      <div class="resto-meta">
        <span>${r.neighborhood || r.city || ''}</span>
        ${priceDotsHtml(r.priceLevel || 1)}
        ${r.terrace ? '<span title="Tiene terraza">☀️</span>' : ''}
      </div>
      <div class="resto-tags">
        ${r.cuisine ? `<span class="tag tag-accent">${r.cuisine}</span>` : ''}
        ${(r.favDishes || []).slice(0,2).map(f => `<span class="tag">♥ ${f.dish}</span>`).join('')}
      </div>
    </div>
    <div class="resto-right">
      <div class="resto-rating">${rating ? starsHtml(rating, 11) : '<span style="color:var(--text-3);font-size:11px">sin nota</span>'}</div>
      <div class="visits-badge">${visits} visita${visits !== 1 ? 's' : ''}</div>
    </div>
  </div>`;
}

// ================================================================
// RESTAURANT DETAIL MODAL
// ================================================================
function openRestaurantDetail(id) {
  const r = restaurants.find(x => x.id === id);
  if (!r) return;
  const rating = getRestaurantAvgRating(r);
  const visits = (r.visits || []).slice().sort((a, b) => b.date.localeCompare(a.date));

  const visitsHtml = visits.length ? visits.map(v => `
    <div class="visit-item">
      <div class="visit-item-header">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">${formatDate(v.date)}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text-2)">
            ${v.rating ? starsHtml(v.rating) : ''}
            <span>👤 ${v.who || 'Ambos'}</span>
            ${v.totalSpent ? `<span>💶 ${v.totalSpent}€</span>` : ''}
          </div>
        </div>
        <button class="visit-delete-btn" onclick="confirmDeleteVisit(${id}, ${v.id})">✕</button>
      </div>
      ${v.notes ? `<div style="font-size:12px;color:var(--text-2);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${v.notes}</div>` : ''}
    </div>`) .join('')
    : '<div style="font-size:12px;color:var(--text-3);padding:10px 0">Sin visitas registradas</div>';

  const favHtml = (r.favDishes || []).map((f, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:15px">❤️</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${f.dish}</div>
        ${f.note ? `<div style="font-size:11px;color:var(--text-2)">${f.note}</div>` : ''}
      </div>
      <span class="fav-user-badge">${f.user || 'Ambos'}</span>
      <button onclick="removeFavDish(${id}, ${i})" style="background:none;border:none;color:var(--text-3);font-size:14px;cursor:pointer">✕</button>
    </div>`).join('');

  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div style="flex:1;min-width:0;padding-right:12px">
          <div class="modal-title" style="margin-bottom:4px">${r.name}</div>
          <div style="font-size:12px;color:var(--text-2)">
            ${[r.neighborhood || r.city, r.cuisine, priceLabelHtml(r.priceLevel), r.terrace ? '☀️ Terraza' : ''].filter(Boolean).join(' · ')}
          </div>
          ${rating ? `<div style="margin-top:5px">${starsHtml(rating)} <span style="font-size:11px;color:var(--text-3)">(${visits.length} visita${visits.length !== 1 ? 's' : ''})</span></div>` : ''}
          ${r.hours ? `<div style="font-size:11px;color:var(--text-2);margin-top:4px">🕒 ${r.hours}</div>` : ''}
          ${r.web ? `<div style="margin-top:4px"><a href="${r.web}" target="_blank" style="font-size:11px;color:var(--accent)">🌐 ${r.web}</a></div>` : ''}
          ${r.phone ? `<div style="margin-top:4px"><a href="tel:${r.phone}" style="font-size:11px;color:var(--accent)">📞 ${r.phone}</a></div>` : ''}
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      ${r.notes ? `<div style="font-size:12px;color:var(--text-2);font-style:italic;margin-bottom:14px;padding:10px;background:var(--bg-subtle);border-radius:10px">${r.notes}</div>` : ''}

      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button onclick="closeModal();openVisitModal(${id})" class="btn-primary" style="margin-top:0;flex:1;min-width:120px">+ Registrar visita</button>
        <button onclick="closeModal();openRestaurantModal(${id})" class="btn-secondary" style="margin-top:0;flex:0 0 auto;width:auto;padding:12px 16px">✏️ Editar</button>
        <button onclick="confirmDeleteRestaurant(${id})" class="btn-danger">🗑</button>
      </div>

      <div class="section-label">Platos favoritos</div>
      ${favHtml || '<div style="font-size:12px;color:var(--text-3);margin-bottom:8px">Sin platos favoritos aún</div>'}
      <button class="btn-ghost" onclick="closeModal();openAddFavDishModal(${id})">❤️ Añadir plato favorito</button>

      <div class="divider"></div>
      <div class="section-label">Historial de visitas (${visits.length})</div>
      ${visitsHtml}
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function confirmDeleteRestaurant(id) {
  const r = restaurants.find(x => x.id === id);
  showConfirm('Eliminar restaurante', `¿Eliminar "${r?.name}" y todas sus visitas? Esta acción no se puede deshacer.`, () => {
    restaurants = restaurants.filter(r => r.id !== id);
    saveData(); render();
    showToast('Restaurante eliminado');
  });
}

function confirmDeleteVisit(restoId, visitId) {
  showConfirm('Eliminar visita', '¿Eliminar esta visita del historial?', () => {
    const r = restaurants.find(x => x.id === restoId);
    if (!r) return;
    r.visits = (r.visits || []).filter(v => v.id !== visitId);
    saveData();
    openRestaurantDetail(restoId);
    showToast('Visita eliminada');
  });
}

function removeFavDish(restoId, dishIdx) {
  const r = restaurants.find(x => x.id === restoId);
  if (!r) return;
  r.favDishes.splice(dishIdx, 1);
  saveData();
  openRestaurantDetail(restoId);
}

function setModalPrice(level) {
  modalPriceLevel = level;
  document.querySelectorAll('.price-opt').forEach((el, i) => el.classList.toggle('active', i + 1 === level));
}

function saveRestaurant() {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { showToast('Escribe un nombre', true); return; }
  const data = {
    id: editingRestoId || Date.now(),
    name,
    neighborhood: document.getElementById('r-neighborhood')?.value || '',
    city: document.getElementById('r-city').value.trim() || 'Zaragoza',
    country: document.getElementById('r-country').value.trim() || 'España',
    cuisine: document.getElementById('r-cuisine').value,
    priceLevel: modalPriceLevel,
    hours: document.getElementById('r-hours').value.trim(),
    phone: document.getElementById('r-phone').value.trim(),
    web: document.getElementById('r-web').value.trim(),
    terrace: document.getElementById('r-terrace').checked,
    notes: document.getElementById('r-notes').value.trim(),
    pendingVisit: editingRestoId ? (restaurants.find(r => r.id === editingRestoId)?.pendingVisit || false) : false,
    favDishes: editingRestoId ? (restaurants.find(r => r.id === editingRestoId)?.favDishes || []) : [],
    visits: editingRestoId ? (restaurants.find(r => r.id === editingRestoId)?.visits || []) : []
  };
  const idx = restaurants.findIndex(r => r.id === data.id);
  if (idx >= 0) restaurants[idx] = data; else restaurants.unshift(data);
  saveData(); closeModal(); render();
  showToast(`"${name}" guardado ✓`);
}

function setVisitRating(val) {

}

function setWho(val) {
  window._visitWho = val;
  document.querySelectorAll('.user-opt').forEach(el => {

}

function saveVisit(restoId) {
  const r = restaurants.find(x => x.id === restoId);
  if (!r) return;
  const date = document.getElementById('v-date').value;
  if (!date) { showToast('Selecciona una fecha', true); return; }
  const visit = {
    id: Date.now(),
    date,
    rating: visitRating,
    who: window._visitWho || 'Ambos',
    totalSpent: parseFloat(document.getElementById('v-spent').value) || null,
    notes: document.getElementById('v-notes').value.trim()
  };
  if (!r.visits) r.visits = [];
  r.visits.push(visit);
  saveData(); closeModal(); render();
  showToast('Visita guardada ✓');
}

// ================================================================
// VIEW: DIARY (con búsqueda)
// ================================================================
function renderDiary() {
  const visits = allVisits().filter(v =>
    !diarySearch || v.restaurantName.toLowerCase().includes(diarySearch.toLowerCase())
  );

  const searchHtml = `<div class="search-bar">
    <input type="text" class="form-input" placeholder="🔍 Buscar en el diario..." value="${diarySearch}" oninput="updateDiarySearch(this.value)">
  </div>`;

  if (!allVisits().length) {
    return `<div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-title">Diario vacío</div>
      <div class="empty-sub">Registra tus visitas desde la ficha de cada restaurante</div>
    </div>`;
  }

  const byMonth = {};
  visits.forEach(v => {
    const key = v.date.slice(0, 7);
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(v);
  });

  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let html = '';

  Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([key, monthVisits]) => {
    const [y, m] = key.split('-');
    const total = monthVisits.reduce((a, v) => a + (v.totalSpent || 0), 0);
    html += `<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline">
      <div class="section-label" style="margin:0">${monthNames[parseInt(m)-1]} ${y}</div>
      <div style="font-size:11px;color:var(--text-3)">${monthVisits.length} visita${monthVisits.length !== 1 ? 's' : ''}${total ? ' · ' + total.toFixed(0) + '€' : ''}</div>
    </div>`;
    html += monthVisits.map(v => `
      <div class="diary-card" onclick="openRestaurantDetail(${v.restaurantId})">
        <div class="diary-date">${formatDate(v.date)}</div>
        <div class="diary-resto-name">${v.restaurantName}</div>
        <div class="diary-meta">
          ${v.rating ? starsHtml(v.rating) : ''}
          <span class="tag">${v.cuisine || ''}</span>
          <span>👤 ${v.who || 'Ambos'}</span>
          ${v.totalSpent ? `<span>💶 ${v.totalSpent}€</span>` : ''}
        </div>
        ${v.notes ? `<div class="diary-note">${v.notes}</div>` : ''}
      </div>`).join('');
  });
return `<div id="diary-search-wrap">
    ${searchHtml}
  </div><div id="diary-cards-container">${html.replace(searchHtml, '')}</div>`;
  return searchHtml + `<div id="diary-cards-container">${html}</div>`;
}

function updateDiarySearch(term) {
  diarySearch = term;
  const visits = allVisits().filter(v =>
    !term || v.restaurantName.toLowerCase().includes(term.toLowerCase())
  );
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const byMonth = {};
  visits.forEach(v => { const key = v.date.slice(0,7); if (!byMonth[key]) byMonth[key]=[]; byMonth[key].push(v); });
  let html = '';
  Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([key, monthVisits]) => {
    const [y, m] = key.split('-');
    const total = monthVisits.reduce((a,v) => a+(v.totalSpent||0), 0);
    html += `<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline">
      <div class="section-label" style="margin:0">${monthNames[parseInt(m)-1]} ${y}</div>
      <div style="font-size:11px;color:var(--text-3)">${monthVisits.length} visita${monthVisits.length!==1?'s':''}${total?' · '+total.toFixed(0)+'€':''}</div>
    </div>`;
    html += monthVisits.map(v => `
      <div class="diary-card" onclick="openRestaurantDetail(${v.restaurantId})">
        <div class="diary-date">${formatDate(v.date)}</div>
        <div class="diary-resto-name">${v.restaurantName}</div>
        <div class="diary-meta">
          ${v.rating ? starsHtml(v.rating) : ''}
          <span class="tag">${v.cuisine||''}</span>
          <span>👤 ${v.who||'Ambos'}</span>
          ${v.totalSpent?`<span>💶 ${v.totalSpent}€</span>`:''}
        </div>
        ${v.notes?`<div class="diary-note">${v.notes}</div>`:''}
      </div>`).join('');
  });
  const container = document.getElementById('diary-cards-container');
  if (container) container.innerHTML = html || '<div class="empty-state"><div class="empty-sub">Sin resultados</div></div>';
}

function openDiaryModal() {
  if (!restaurants.filter(r => !r.pendingVisit).length) { showToast('Añade un restaurante primero', true); return; }
  const restoOptions = restaurants.filter(r => !r.pendingVisit).map(r =>
    `<option value="${r.id}">${r.name}</option>`
  ).join('');
  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">

      <div class="modal-title">Nueva visita<button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="form-row">
        <label class="form-label">Restaurante</label>
        <select id="dv-resto" class="form-input">${restoOptions}</select>
      </div>
      <button class="btn-primary" onclick="const id=parseInt(document.getElementById('dv-resto').value);closeModal();openVisitModal(id)">Continuar</button>
    </div>
  </div>`;

// ================================================================
// VIEW: DISCOVER
// ================================================================
function renderDiscover() {
  const pending = restaurants.filter(r => r.pendingVisit);
  const visited = restaurants.filter(r => !r.pendingVisit);
  const today = new Date();

  const suggestions = visited.filter(r => {
    const visits = r.visits || [];
    if (!visits.length) return false;
    const last = new Date(visits.slice().sort((a,b) => b.date.localeCompare(a.date))[0].date + 'T12:00:00');
    return (today - last) / 86400000 > 60;
  }).slice(0, 4);

  let html = '';

  if (pending.length) {
    html += `<div class="section-label">Para ir pronto (${pending.length})</div>`;
    html += pending.map(r => `
      <div class="pending-card" onclick="openPendingDetail(${r.id})">
        <div class="resto-stripe ${stripeClass(r.cuisine)}" style="width:4px;border-radius:2px;flex-shrink:0;min-height:40px"></div>
        <div style="flex:1;padding-left:8px">
          <div class="pending-name">${r.name}</div>
          <div class="pending-meta">${r.neighborhood || r.city || ''} · ${r.cuisine || ''} · ${priceLabelHtml(r.priceLevel)}${r.hours ? ` · 🕒 ${r.hours}` : ''}</div>
        </div>
        <button onclick="event.stopPropagation();markAsVisited(${r.id})" style="background:var(--accent-soft);border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer">Ya fui ✓</button>
      </div>`).join('');
    html += '<div class="divider"></div>';
  }

  if (suggestions.length) {
    html += `<div class="section-label">Hace tiempo que no vas...</div>`;
    html += suggestions.map(r => {
      const lastVisit = r.visits.slice().sort((a,b) => b.date.localeCompare(a.date))[0];
      const days = Math.round((today - new Date(lastVisit.date + 'T12:00:00')) / 86400000);
      return `<div class="pending-card" onclick="openRestaurantDetail(${r.id})">
        <div class="resto-stripe ${stripeClass(r.cuisine)}" style="width:4px;border-radius:2px;flex-shrink:0;min-height:40px"></div>
        <div style="flex:1;padding-left:8px">
          <div class="pending-name">${r.name}</div>
          <div class="pending-meta">${r.cuisine || ''} · Última visita hace ${days} días</div>
        </div>
        <button onclick="event.stopPropagation();closeModal();openVisitModal(${r.id})" style="background:var(--bg-subtle);border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;color:var(--text-2);cursor:pointer">Ir ahora</button>
      </div>`;
    }).join('');
  }

  if (!pending.length && !suggestions.length) {
    html = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">¡Todo al día!</div>
      <div class="empty-sub">Añade restaurantes pendientes o espera a tener más historial</div>
    </div>`;
  }

  return html;
}

  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

function applyWiqFilters() {
  let filtered = restaurants.filter(r => !r.pendingVisit);
  if (wiqFilters.type === 'bar') filtered = filtered.filter(r => r.priceLevel <= 2);
  if (wiqFilters.type === 'restaurant') filtered = filtered.filter(r => r.priceLevel >= 3);
  if (wiqFilters.speed === 'fast') filtered = filtered.filter(r => r.priceLevel <= 2);
  if (wiqFilters.speed === 'slow') filtered = filtered.filter(r => r.priceLevel >= 3);
  if (wiqFilters.budget === true) filtered = filtered.filter(r => r.priceLevel <= 2);
  if (wiqFilters.budget === false) filtered = filtered.filter(r => r.priceLevel >= 3);
  if (wiqFilters.terrace === true) filtered = filtered.filter(r => r.terrace);
  if (wiqFilters.terrace === false) filtered = filtered.filter(r => !r.terrace);
  if (wiqFilters.cuisine) filtered = filtered.filter(r => r.cuisine === wiqFilters.cuisine);

  filtered.sort((a, b) => calculateFoodieScore(b) - calculateFoodieScore(a));

  const resultsHtml = filtered.slice(0, 5).map(r => `
    <div class="pending-card" onclick="openRestaurantDetail(${r.id})" style="padding:10px">
      <div class="resto-stripe ${stripeClass(r.cuisine)}" style="width:4px;border-radius:2px;flex-shrink:0;min-height:36px"></div>

    `<div class="section-label">Te recomendamos (${filtered.length})</div>${resultsHtml || '<div style="font-size:12px;color:var(--text-3);text-align:center;padding:12px">No hay coincidencias</div>'}`;
}

function getRouletteRestaurants() {
  return restaurants.filter(r => {
    if (r.pendingVisit) return false;
    if (rouletteFilters.cuisine !== 'all' && r.cuisine !== rouletteFilters.cuisine) return false;
    if (rouletteFilters.neighborhood !== 'all' && r.neighborhood !== rouletteFilters.neighborhood) return false;
    if (rouletteFilters.city !== 'all' && r.city !== rouletteFilters.city) return false;
    if (rouletteFilters.price !== 'all') {
      if (rouletteFilters.price === '4-5') { if (r.priceLevel < 4) return false; }
      else if (r.priceLevel !== parseInt(rouletteFilters.price)) return false;
    }
    return true;
  });
}

const ROULETTE_COLORS = ['#E8613C','#2D6A4F','#3D5AF1','#D4AF37','#9B59B6','#2980B9','#E84C4C','#F5A623','#1ABC9C','#E91E8C'];

function drawRoulette() {
  const canvas = document.getElementById('roulette-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const candidates = getRouletteRestaurants();
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!candidates.length) {
    ctx.fillStyle = 'var(--border)'; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.font = '14px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Sin opciones', cx, cy); return;
  }

  const slice = (Math.PI * 2) / candidates.length;
  candidates.forEach((rest, i) => {
    const startAngle = i * slice + rouletteAngle, endAngle = startAngle + slice;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startAngle, endAngle); ctx.closePath();
    ctx.fillStyle = ROULETTE_COLORS[i % ROULETTE_COLORS.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(startAngle + slice / 2);
    ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
    ctx.font = `bold ${candidates.length > 8 ? 10 : 12}px Inter`;
    const label = rest.name.length > 14 ? rest.name.slice(0, 13) + '…' : rest.name;
    ctx.fillText(label, r - 10, 4); ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = 'var(--bg-card)'; ctx.fill();
  ctx.strokeStyle = 'var(--border)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + r - 2, cy); ctx.lineTo(cx + r + 14, cy - 7); ctx.lineTo(cx + r + 14, cy + 7); ctx.closePath();
  ctx.fillStyle = 'var(--text)'; ctx.fill();
}

function spinRoulette() {
  if (rouletteSpinning) return;
  const candidates = getRouletteRestaurants();
  if (candidates.length < 2) return;
  rouletteSpinning = true; rouletteResult = null;
  document.getElementById('roulette-result').textContent = '';
  document.getElementById('roulette-result-meta').textContent = '...';
  const totalAngle = (5 + Math.random() * 5) * Math.PI * 2;
  const duration = 3500, start = performance.now(), startAngle = rouletteAngle;
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    rouletteAngle = startAngle + totalAngle * easeOut(t);
    drawRoulette();
    if (t < 1) { requestAnimationFrame(animate); }
    else {
      rouletteSpinning = false;
      const slice = (Math.PI * 2) / candidates.length;
      const norm = ((rouletteAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const idx = Math.abs(candidates.length - 1 - Math.floor(norm / slice) % candidates.length) % candidates.length;
      rouletteResult = candidates[idx];
      render(); setTimeout(drawRoulette, 50);
    }
  }
  requestAnimationFrame(animate);
}

      <div class="form-2col">
        <div class="form-row"><label class="form-label">Dificultad</label><select id="rc-diff" class="form-input">${['Fácil','Media','Difícil'].map(d=>`<option ${r?.difficulty===d?'selected':''}>${d}</option>`).join('')}</select></div>
        <div class="form-row"><label class="form-label">Personas</label><input type="number" id="rc-servings" class="form-input" placeholder="2" value="${r?.servings||''}"></div>
      </div>
      <div class="form-row"><label class="form-label">Ingredientes</label><textarea id="rc-ingredients" class="form-input" rows="4" placeholder="- 200g arroz&#10;- 1 cebolla...">${r?.ingredients||''}</textarea></div>
      <div class="form-row"><label class="form-label">Preparación</label><textarea id="rc-steps" class="form-input" rows="5" placeholder="1. Pochar la cebolla...">${r?.steps||''}</textarea></div>
      <div class="form-row"><label class="form-label">Notas</label><textarea id="rc-notes" class="form-input" placeholder="Trucos, variaciones...">${r?.notes||''}</textarea></div>
      <button class="btn-primary" onclick="saveRecipe(${id||'null'})">Guardar</button>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function saveRecipe(id) {
  const name = document.getElementById('rc-name').value.trim();
  if (!name) { showToast('Escribe un nombre', true); return; }
  const data = {
    id: id || Date.now(), name,
    cuisine: document.getElementById('rc-cuisine').value,
    time: document.getElementById('rc-time').value,
    difficulty: document.getElementById('rc-diff').value,
    servings: document.getElementById('rc-servings').value,
    ingredients: document.getElementById('rc-ingredients').value.trim(),
    steps: document.getElementById('rc-steps').value.trim(),
    notes: document.getElementById('rc-notes').value.trim(),
    createdAt: id ? (recipes.find(r=>r.id===id)?.createdAt||new Date().toISOString()) : new Date().toISOString()
  };
  const idx = recipes.findIndex(r => r.id === data.id);
  if (idx >= 0) recipes[idx] = data; else recipes.unshift(data);
  saveData(); closeModal(); render();
  showToast(`"${name}" guardada ✓`);
}

function confirmDeleteRecipe(id) {
  const r = recipes.find(x => x.id === id);
  showConfirm('Eliminar receta', `¿Eliminar "${r?.name}"?`, () => {
    recipes = recipes.filter(r => r.id !== id);
    saveData(); render();
    showToast('Receta eliminada');
  });
}

function filterTicketRestos(term) {
  const list = document.getElementById('tk-resto-list');
  if (!list) return;
  const visited = restaurants.filter(r => !r.pendingVisit);
  const matches = term
    ? visited.filter(r => r.name.toLowerCase().includes(term.toLowerCase())).slice(0, 8)
    : visited.slice(0, 8);
  list.innerHTML = matches.map(r =>
    `<div onclick="selectTicketResto(${r.id},'${r.name.replace(/'/g,"\\'")}')"
      style="padding:6px 12px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-2)">
      ${r.name}
    </div>`
  ).join('');
}

function selectTicketResto(id, name) {
  window._ticketRestoId = id;
  window._ticketRestoName = name;
  document.getElementById('tk-search').value = '';
  document.getElementById('tk-resto-list').innerHTML = '';
  const sel = document.getElementById('tk-resto-selected');
  document.getElementById('tk-resto-selected-name').textContent = '🍽️ ' + name;
  sel.style.display = 'block';
}

function clearTicketResto() {
  window._ticketRestoId = null;
  window._ticketRestoName = null;
  document.getElementById('tk-resto-selected').style.display = 'none';
  filterTicketRestos('');
}

function saveTicket() {
  const total = parseFloat(document.getElementById('tk-total').value);
  if (isNaN(total) || total <= 0) { showToast('Introduce un total válido', true); return; }
  const itemsRaw = document.getElementById('tk-items').value.trim();
  const items = itemsRaw ? itemsRaw.split('\n').map(l => {
    const parts = l.split('·');
    return { name: parts[0]?.trim() || l, price: parseFloat(parts[1]) || null };
  }) : [];
  tickets.unshift({
    id: Date.now(),
    date: document.getElementById('tk-date').value,
    restaurantId: window._ticketRestoId || null,
    restaurantName: window._ticketRestoName || 'Sin nombre',
    total, items,
    notes: document.getElementById('tk-notes').value.trim(),
    savedAt: new Date().toISOString()
  });
  saveData(); closeModal(); render();
  showToast(`Ticket ${total.toFixed(2)}€ guardado ✓`);
}

function renderTicketCard(t) {
  const itemsHtml = t.items?.length ? t.items.map(i =>
    `<div class="scan-line"><span>${i.name}</span><span>${i.price ? i.price.toFixed(2)+'€' : ''}</span></div>`
  ).join('') : '';
  return `<div class="ticket-card">
    <div class="ticket-header">
      <div>
        <div style="font-size:13px;font-weight:600">${t.restaurantName}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">${formatDate(t.date)}</div>
        ${t.notes?`<div style="font-size:11px;color:var(--text-2);font-style:italic;margin-top:2px">${t.notes}</div>`:''}
      </div>
      <div class="ticket-total">${t.total.toFixed(2)}€</div>

    ${itemsHtml?`<div class="ticket-items">${itemsHtml}</div>`:''}
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button onclick="confirmDeleteTicket(${t.id})" style="background:none;border:none;font-size:12px;color:var(--text-3);cursor:pointer">🗑 Eliminar</button>

}

function confirmDeleteTicket(id) {
  showConfirm('Eliminar ticket', '¿Eliminar este ticket?', () => {

}

function renderStatsWithFoodieIndex() {
  const allV = allVisits();
  const totalVisits = allV.length;
  const totalSpent = allV.reduce((a, v) => a + (v.totalSpent || 0), 0);
  const avgSpent = totalVisits ? totalSpent / totalVisits : 0;
  const ratedVisits = allV.filter(v => v.rating);
  const avgRating = ratedVisits.length ? ratedVisits.reduce((a,v) => a+v.rating, 0) / ratedVisits.length : 0;

  // Gasto por persona
  const spentValle = allV.filter(v => v.who === 'Valle' || v.who === 'Ambos').reduce((a,v) => a + (v.totalSpent||0)/((v.who==='Ambos')?2:1), 0);
  const spentJandro = allV.filter(v => v.who === 'Jandro' || v.who === 'Ambos').reduce((a,v) => a + (v.totalSpent||0)/((v.who==='Ambos')?2:1), 0);

  // Racha de semanas
  const weeks = new Set(allV.map(v => { const d = new Date(v.date+'T12:00:00'); const w = Math.floor(d.getTime()/(7*86400000)); return w; }));
  let streak = 0;
  const now = new Date(); const nowWeek = Math.floor(now.getTime()/(7*86400000));
  for (let w = nowWeek; weeks.has(w); w--) streak++;

  // Restaurante del mes
  const thisMonth = new Date().toISOString().slice(0,7);
  const thisMonthVisits = allV.filter(v => v.date.startsWith(thisMonth));
  const monthRestoCounts = {};
  thisMonthVisits.forEach(v => { monthRestoCounts[v.restaurantId] = (monthRestoCounts[v.restaurantId]||0)+1; });
  const topRestoId = Object.entries(monthRestoCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const topResto = topRestoId ? restaurants.find(r => r.id == topRestoId) : null;

  const foodieRank = restaurants.filter(r => !r.pendingVisit)
    .map(r => ({...r, score: calculateFoodieScore(r)}))
    .sort((a,b) => b.score - a.score).slice(0,10);

  return `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${restaurants.filter(r=>!r.pendingVisit).length}</div><div class="stat-lbl">Restaurantes</div></div>
      <div class="stat-box"><div class="stat-val">${totalVisits}</div><div class="stat-lbl">Visitas</div></div>
      <div class="stat-box"><div class="stat-val">${avgRating ? avgRating.toFixed(1) : '—'}</div><div class="stat-lbl">Nota media</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${totalSpent ? totalSpent.toFixed(0)+'€' : '—'}</div><div class="stat-lbl">Total gastado</div></div>
      <div class="stat-box"><div class="stat-val">${avgSpent ? avgSpent.toFixed(0)+'€' : '—'}</div><div class="stat-lbl">Media/visita</div></div>
      <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">Racha (sem.)</div></div>
    </div>

    ${topResto ? `<div class="card card-padded" style="margin-bottom:12px;background:var(--accent-soft);border-color:var(--accent)">
      <div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">⭐ Restaurante del mes</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700">${topResto.name}</div>
      <div style="font-size:11px;color:var(--text-2);margin-top:2px">${thisMonthVisits.filter(v=>v.restaurantId==topRestoId).length} visitas este mes</div>
    </div>` : ''}

    <div class="card card-padded" style="margin-bottom:12px">
      <div class="chart-title">💶 Gasto por persona</div>
      <div style="display:flex;gap:12px">
        <div style="flex:1;text-align:center;padding:12px;background:var(--bg-subtle);border-radius:10px">
          <div style="font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px">Valle</div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent)">${spentValle ? spentValle.toFixed(0)+'€' : '—'}</div>
        </div>
        <div style="flex:1;text-align:center;padding:12px;background:var(--bg-subtle);border-radius:10px">
          <div style="font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px">Jandro</div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent)">${spentJandro ? spentJandro.toFixed(0)+'€' : '—'}</div>
        </div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">🏆 Índice Foodie (Top 10)</div>
      ${foodieRank.map((r,i) => {
        const mc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        return `<div class="rank-item">
          <div class="rank-num ${mc}">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${r.name}</div>
            <div class="rank-sub">${r.cuisine} · ${r.neighborhood||r.city}</div>
          </div>
          <div style="text-align:right">
            <div class="rank-score">${r.score}/100</div>
            <div class="foodie-index-bar"><div class="foodie-index-fill" style="width:${r.score}%"></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="chart-card"><div class="chart-title">🍽️ Visitas por cocina</div><canvas id="cuisineChart" height="180"></canvas></div>
    <div class="chart-card"><div class="chart-title">📅 Visitas por mes</div><canvas id="monthChart" height="180"></canvas></div>
    <div class="chart-card"><div class="chart-title">💶 Gasto por mes</div><canvas id="spendChart" height="180"></canvas></div>
  `;
}

function initStatsCharts() {
  const allV = allVisits();
  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? '#9A9A9A' : '#6B6B6B';
  const gridColor = isDark ? '#2A2A2A' : '#EBEBEB';
  const baseOpts = {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: textColor, font: { family: 'Inter', size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: textColor, font: { family: 'Inter', size: 10 } }, grid: { color: gridColor } }
    }
  };

  const cuisineMap = {};
  allV.forEach(v => { cuisineMap[v.cuisine||'Otro'] = (cuisineMap[v.cuisine||'Otro']||0)+1; });
  const cEntries = Object.entries(cuisineMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  destroyChart('cuisineChart');
  const cCtx = document.getElementById('cuisineChart')?.getContext('2d');
  if (cCtx) chartInstances['cuisineChart'] = new Chart(cCtx, { type:'bar', data:{ labels:cEntries.map(([k])=>k), datasets:[{ data:cEntries.map(([,v])=>v), backgroundColor:ROULETTE_COLORS }] }, options:baseOpts });

  const monthMap = {};
  allV.forEach(v => { const k=v.date.slice(0,7); monthMap[k]=(monthMap[k]||0)+1; });
  const mEntries = Object.entries(monthMap).sort().slice(-12);
  destroyChart('monthChart');
  const mCtx = document.getElementById('monthChart')?.getContext('2d');
  if (mCtx) chartInstances['monthChart'] = new Chart(mCtx, { type:'line', data:{ labels:mEntries.map(([k])=>k.slice(5)), datasets:[{ data:mEntries.map(([,v])=>v), borderColor:'#E8613C', tension:0.3, fill:true, backgroundColor:'rgba(232,97,60,0.1)' }] }, options:baseOpts });

  const spendMap = {};
  allV.forEach(v => { if(v.totalSpent){ const k=v.date.slice(0,7); spendMap[k]=(spendMap[k]||0)+v.totalSpent; } });
  const sEntries = Object.entries(spendMap).sort().slice(-12);
  destroyChart('spendChart');
  const sCtx = document.getElementById('spendChart')?.getContext('2d');
  if (sCtx) chartInstances['spendChart'] = new Chart(sCtx, { type:'bar', data:{ labels:sEntries.map(([k])=>k.slice(5)), datasets:[{ data:sEntries.map(([,v])=>Math.round(v)), backgroundColor:'#2D6A4F' }] }, options:baseOpts });
}

function destroyChart(name) {
  if (chartInstances[name]) { try { chartInstances[name].destroy(); } catch(e) {} delete chartInstances[name]; }
}

const NEIGHBORHOOD_COORDS = {
  'Casco Antiguo': [41.6561, -0.8773], 'El Tubo': [41.6555, -0.8790], 'Centro': [41.6523, -0.8867],
  'Paseo Independencia': [41.6490, -0.8858], 'Romareda': [41.6398, -0.9040], 'Universidad': [41.6476, -0.8934],
  'Delicias': [41.6530, -0.9120], 'San José': [41.6620, -0.8750], 'Las Fuentes': [41.6640, -0.8620],
  'Torrero': [41.6310, -0.8830], 'La Paz': [41.6720, -0.8870], 'Actur': [41.6800, -0.8920],
  'Rey Fernando': [41.6750, -0.8980], 'Miralbueno': [41.6480, -0.9300], 'Valdespartera': [41.6090, -0.8900],
  'Montecanal': [41.6180, -0.9050], 'Parque Goya': [41.6850, -0.8700], 'Santa Isabel': [41.6990, -0.8560],
  'Oliver': [41.6560, -0.9260], 'Valdefierro': [41.6400, -0.9200], 'Almozara': [41.6590, -0.9030],
  'Expo': [41.6650, -0.9100], 'Casablanca': [41.6310, -0.8730], 'Arrabal': [41.6660, -0.8790],
  'San Pablo': [41.6590, -0.8810], 'La Almozara': [41.6600, -0.9050]
};

function initMap() {
  const mapEl = document.getElementById('foodie-map');
  if (!mapEl) return;
  if (mapInstance) { mapInstance.invalidateSize(); return; }

  mapInstance = L.map('foodie-map').setView([41.6488, -0.8891], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM contributors'
  }).addTo(mapInstance);

  restaurants.forEach(r => {
    const baseCoords = NEIGHBORHOOD_COORDS[r.neighborhood] || [41.6488, -0.8891];
    // Pequeño offset aleatorio dentro del barrio para no apilar todos en el mismo punto
    const jitter = 0.004;
    const lat = baseCoords[0] + (Math.random() - 0.5) * jitter;
    const lng = baseCoords[1] + (Math.random() - 0.5) * jitter;
    const isVisited = (r.visits||[]).length > 0;
    const color = r.pendingVisit ? '#3D7CC9' : (isVisited ? '#2D9E4E' : '#E8613C');
    const marker = L.circleMarker([lat, lng], {
      radius: 7, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.85
    }).addTo(mapInstance);
    const avgRating = getRestaurantAvgRating(r);
    marker.bindPopup(`<b style="font-family:serif">${r.name}</b><br>
      ${r.cuisine||''} · ${r.neighborhood||r.city||''}<br>
      ${priceLabelHtml(r.priceLevel)}${avgRating ? ' · ' + avgRating + '★' : ''}
      ${r.hours ? '<br>🕒 ' + r.hours : ''}
    `);
    marker.on('click', () => { setTimeout(() => openRestaurantDetail(r.id), 300); });
  });
}

      <div style="font-size:10px;color:var(--text-3);margin-top:4px">${storageKB} KB de ~5.000 KB disponibles</div>
    </div>

    <div class="divider"></div>
    <div class="section-label">Información</div>
    <div class="card card-padded" style="font-size:12px;color:var(--text-2);line-height:1.7">
      <div><strong>foodie</strong> — tu diario gastronómico personal</div>
      <div style="margin-top:6px">Todos los datos se guardan localmente en tu dispositivo.</div>
      <div style="margin-top:4px">Usuarios: Valle & Jandro</div>
      <div style="margin-top:4px;color:var(--text-3)">
        ${restaurants.filter(r=>!r.pendingVisit).length} restaurantes · ${restaurants.filter(r=>r.pendingVisit).length} pendientes · ${allVisits().length} visitas · ${recipes.length} recetas · ${tickets.length} tickets
      </div>
    </div>
  `;
}

function setTheme(t) {
  document.body.className = t;
  localStorage.setItem('foodie_theme', t);
  render();
  if (moreTab === 'stats') setTimeout(initStatsCharts, 50);
  if (currentView === 'roulette') setTimeout(drawRoulette, 50);
}
